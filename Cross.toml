[target.x86_64-unknown-linux-gnu]
# - cmake: aws-lc-sys CMake builder
# - mold: fast linker (~3-5x faster link phase)
# - sccache: compilation cache across cross invocations; SCCACHE_DIR is
#   mounted into the container so the cache persists between builds
pre-build = ["""
apt-get update && apt-get install -y cmake curl &&
curl -sL https://github.com/rui314/mold/releases/download/v2.35.1/mold-2.35.1-x86_64-linux.tar.gz | tar -xz -C /usr/local --strip-components=1 &&
mkdir -p /opt/mold-shim && ln -sf /usr/local/bin/ld.mold /opt/mold-shim/ld &&
curl -sL https://github.com/mozilla/sccache/releases/download/v0.10.0/sccache-v0.10.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/sccache.tgz &&
tar -xzf /tmp/sccache.tgz -C /tmp &&
install -m 0755 /tmp/sccache-v0.10.0-x86_64-unknown-linux-musl/sccache /usr/local/bin/sccache &&
rm -rf /tmp/sccache.tgz /tmp/sccache-v0.10.0-x86_64-unknown-linux-musl
"""]

[target.x86_64-unknown-linux-gnu.env]
passthrough = ["AWS_LC_SYS_CMAKE_BUILDER", "RUSTC_WRAPPER", "SCCACHE_DIR", "SCCACHE_CACHE_SIZE"]
volumes = ["SCCACHE_DIR"]
