---
# Red Team Multi-Agent Tasks
# Extracted from main Taskfile to reduce duplication
version: "3"

# Enable proper shell behavior for pipelines
set: [errexit, pipefail]
shopt: [globstar]

vars:
  # Rust CLI binary path (passed from parent Taskfile)
  ARES_CLI: '{{.ARES_CLI | default "./target/release/ares"}}'
  # Remote paths (local to this taskfile)
  REMOTE_REPORT_DIR: '{{.REMOTE_REPORT_DIR | default "/reports"}}'

tasks:
  # ===========================================================================
  # Multi-Agent Red Team Tasks
  # ===========================================================================

  multi:
    desc: "Run multi-agent red team operation (usage: task red:multi [TARGET=dreadgoad] [DOMAIN=contoso.local] [TARGET_ENV=staging] [IPS=10.1.10.10,10.1.10.11] [FOLLOW=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      RESUME: '{{.RESUME | default "false"}}'
      FOLLOW: '{{.FOLLOW | default "true"}}'
      POLL_INTERVAL: '{{.POLL_INTERVAL | default "30"}}'
      MAX_WAIT: '{{.MAX_WAIT | default "7200"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
      TARGET_ENV: '{{.TARGET_ENV | default "staging"}}'
      IPS: '{{.IPS | default ""}}'
      OPERATION_ID_COMPUTED:
        sh: |
          if [ -n "{{.OPERATION_ID}}" ]; then
            echo "{{.OPERATION_ID}}"
          else
            echo "op-$(date +%Y%m%d-%H%M%S)"
          fi
      REDIS_URL:
        sh: |
          REDIS_PASS=$(kubectl get secret redis-secret -n {{.K8S_NAMESPACE}} -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")
          if [ -n "$REDIS_PASS" ]; then
            echo "redis://:${REDIS_PASS}@redis:6379"
          else
            echo "redis://redis:6379"
          fi
      LOGFILE:
        sh: echo "{{.LOG_DIR}}/red-multi-{{.OPERATION_ID_COMPUTED}}-$(date +%Y%m%d-%H%M%S).log"
    preconditions:
      - sh: test -n "{{.TARGET}}"
        msg: "TARGET variable is required. Usage: task red:multi TARGET=dreadgoad"
    cmds:
      # Create log directory
      - cmd: mkdir -p {{.LOG_DIR}}
        silent: true

      # Submit operation (CLI handles target resolution, credential sourcing, and active-op pinning)
      - cmd: |
          echo "Operation ID: {{.OPERATION_ID_COMPUTED}}"
          echo "Target: {{.TARGET}} ({{.DOMAIN}})"
          echo "K8s namespace: {{.K8S_NAMESPACE}}"
          if [ "{{.RESUME}}" = "true" ]; then
            echo "Resuming from checkpoint"
          fi
          echo "Logging to: {{.LOGFILE}}"
          echo ""

          RESUME_FLAG=""
          if [ "{{.RESUME}}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi

          MODEL_OVERRIDE_ENV=""
          if [ -n "{{.MODEL}}" ]; then
            MODEL_OVERRIDE_ENV="ARES_MODEL_OVERRIDE={{.MODEL}}"
          fi

          # When IPS is supplied, target IPs directly and skip EC2 Name-tag resolution
          # (the orchestrator pod has no `aws` CLI). Otherwise default to AWS lookup.
          if [ -n "{{.IPS}}" ]; then
            TARGET_FLAGS="--ips {{.IPS}}"
          else
            TARGET_FLAGS="--resolve-targets --aws-profile {{.TARGET_PROFILE}} --aws-region {{.TARGET_REGION}}"
          fi

          # CLI auto-loads .env if present, or use --secrets-from 1password
          kubectl exec -i -n {{.K8S_NAMESPACE}} deploy/ares-orchestrator -- \
            env $MODEL_OVERRIDE_ENV \
            DREADNODE_SERVER_URL="{{.DREADNODE_SERVER_URL}}" \
            DREADNODE_ORGANIZATION="{{.DREADNODE_ORGANIZATION}}" \
            DREADNODE_WORKSPACE="{{.DREADNODE_WORKSPACE}}" \
            DREADNODE_PROJECT="{{.DREADNODE_PROJECT}}" \
            ARES_CONFIG="/etc/ares/config.yaml" \
            GRAFANA_URL="{{.GRAFANA_URL}}" \
            ares --redis-url "{{.REDIS_URL}}" ops submit \
            "{{.TARGET}}" "{{.DOMAIN}}" \
            $TARGET_FLAGS \
            --pin-active \
            --operation-id "{{.OPERATION_ID_COMPUTED}}" \
            --model "{{.MODEL}}" \
            --max-steps {{.MAX_STEPS_RED}} \
            --env "{{.TARGET_ENV}}" \
            $RESUME_FLAG \
            2>&1 | tee -a "{{.LOGFILE}}"
        silent: false

      - cmd: |
          if [ "{{.FOLLOW}}" != "true" ]; then
            echo ""
            echo "Operation {{.OPERATION_ID_COMPUTED}} submitted without local wait."
            echo "Auto-fetch later with: task red:multi:watch OPERATION_ID={{.OPERATION_ID_COMPUTED}} ONCE=true OUTPUT_DIR={{.OUTPUT_DIR}}"
            exit 0
          fi

          echo ""
          echo "Watching operation status (poll={{.POLL_INTERVAL}}s, max_wait={{.MAX_WAIT}}s)"
          echo "Operation ID: {{.OPERATION_ID_COMPUTED}}"
          echo "Report will be fetched to {{.OUTPUT_DIR}}/red/ when the op reaches a terminal state"
          echo ""

          START=$(date +%s)
          while true; do
            ELAPSED=$(( $(date +%s) - START ))
            if [ $ELAPSED -gt {{.MAX_WAIT}} ]; then
              echo "ERROR: Max wait ({{.MAX_WAIT}}s) exceeded; report was not auto-fetched"
              echo "Fetch manually: task red:multi:report OPERATION_ID={{.OPERATION_ID_COMPUTED}} OUTPUT_DIR={{.OUTPUT_DIR}}"
              exit 1
            fi

            STATUS_OUT=$({{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops status "{{.OPERATION_ID_COMPUTED}}" 2>&1 || true)
            STATUS=$(echo "$STATUS_OUT" | grep -E '^Status: ' | head -1 | awk '{print $2}')

            if [ -z "$STATUS" ]; then
              echo "[${ELAPSED}s] no status yet (waiting for op to register)" | tee -a "{{.LOGFILE}}"
            else
              echo "[${ELAPSED}s] status=$STATUS" | tee -a "{{.LOGFILE}}"
              case "$STATUS" in
                completed|stopped)
                  echo ""
                  echo "Operation reached terminal state: $STATUS"
                  echo "Fetching report..."
                  task red:multi:report OPERATION_ID={{.OPERATION_ID_COMPUTED}} OUTPUT_DIR={{.OUTPUT_DIR}}
                  exit 0
                  ;;
                failed|cancelled)
                  echo "Operation reached terminal state: $STATUS; fetching best-effort report"
                  task red:multi:report OPERATION_ID={{.OPERATION_ID_COMPUTED}} OUTPUT_DIR={{.OUTPUT_DIR}} || true
                  exit 1
                  ;;
              esac
            fi

            sleep {{.POLL_INTERVAL}}
          done
        silent: false

  # ===========================================================================
  # K8s CLI wrappers — run ares on the orchestrator pod
  # ===========================================================================

  multi:loot:
    desc: "Dump users, credentials, and hosts from Redis state (usage: task red:multi:loot [OPERATION_ID=op-xxx] [LATEST=true] [WATCH=10] [DIFF=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default ""}}'
      WATCH: '{{.WATCH | default "0"}}'
      DIFF: '{{.DIFF | default "false"}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}" || test "{{.LATEST}}" = "true"
        msg: "Either OPERATION_ID or LATEST=true is required. Usage: task red:multi:loot OPERATION_ID=op-xxx  OR  task red:multi:loot LATEST=true"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops loot
        {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
        {{if eq .LATEST "true"}}--latest{{end}}
        {{if ne .WATCH "0"}}--watch {{.WATCH}}{{end}}
        {{if eq .DIFF "true"}}--diff{{end}}

  multi:status:
    desc: "Check multi-agent operation status (usage: task red:multi:status [OPERATION_ID=op-xxx] [LATEST=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default ""}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}" || test "{{.LATEST}}" = "true"
        msg: "Either OPERATION_ID or LATEST=true is required"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops status
        {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
        {{if eq .LATEST "true"}}--latest{{end}}

  multi:inspect-vulns:
    desc: "Bucket discovered vs exploited vulns by type — vuln→exploit conversion diagnostic (usage: task red:multi:inspect-vulns [OPERATION_ID=op-xxx] [LATEST=true] [JSON=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default ""}}'
      JSON: '{{.JSON | default "false"}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}" || test "{{.LATEST}}" = "true"
        msg: "Either OPERATION_ID or LATEST=true is required"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops inspect-vulns
        {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
        {{if eq .LATEST "true"}}--latest{{end}}
        {{if eq .JSON "true"}}--json{{end}}

  multi:tasks:list:
    desc: "List tasks for an operation (usage: task red:multi:tasks:list [OPERATION_ID=op-xxx] [LATEST=true] [ROLE=lateral] [STATUS=pending|in_progress|running|completed|failed|all])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default ""}}'
      ROLE: '{{.ROLE | default ""}}'
      STATUS: '{{.STATUS | default "running"}}'
      VALID_STATUSES: "pending in_progress running completed failed cancelled retrying all"
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}" || test "{{.LATEST}}" = "true"
        msg: "Either OPERATION_ID or LATEST=true is required"
      - sh: echo "{{.VALID_STATUSES}}" | grep -qw "{{.STATUS}}"
        msg: "Invalid STATUS '{{.STATUS}}'. Valid values: pending, in_progress, running, completed, failed, cancelled, retrying, all"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops tasks
        {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
        {{if eq .LATEST "true"}}--latest{{end}}
        --status {{.STATUS}}
        {{if ne .ROLE ""}}--role {{.ROLE}}{{end}}

  multi:runtime:
    desc: "Show runtime for an operation (usage: task red:multi:runtime [OPERATION_ID=op-xxx] [LATEST=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default ""}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}" || test "{{.LATEST}}" = "true"
        msg: "Either OPERATION_ID or LATEST=true is required"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops runtime
        {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
        {{if eq .LATEST "true"}}--latest{{end}}

  multi:report:
    desc: "Generate markdown report for an operation (usage: task red:multi:report [OPERATION_ID=op-xxx] [LATEST=true] [REGENERATE=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default ""}}'
      REGENERATE: '{{.REGENERATE | default "false"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}" || test "{{.LATEST}}" = "true"
        msg: "Either OPERATION_ID or LATEST=true is required. Usage: task red:multi:report OPERATION_ID=op-xxx  OR  task red:multi:report LATEST=true"
    cmds:
      - cmd: mkdir -p "{{.OUTPUT_DIR}}"
        silent: true
      - |
        # Generate report on pod
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops report \
          {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}} \
          {{if eq .LATEST "true"}}--latest{{end}} \
          {{if eq .REGENERATE "true"}}--regenerate{{end}} \
          --output-dir /tmp/reports

        # Resolve operation ID for kubectl cp
        if [ "{{.LATEST}}" = "true" ]; then
          RESOLVED_OP_ID=$({{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops list --latest 2>/dev/null | tr -d '\n')
        else
          RESOLVED_OP_ID="{{.OPERATION_ID}}"
        fi

        # Copy report from pod to local machine
        if [ -n "$RESOLVED_OP_ID" ]; then
          mkdir -p "{{.OUTPUT_DIR}}/red"
          ORCH_POD=$(kubectl get pods -n {{.K8S_NAMESPACE}} -l app.kubernetes.io/name=ares-orchestrator -o jsonpath='{.items[0].metadata.name}')
          kubectl cp "{{.K8S_NAMESPACE}}/${ORCH_POD}:/tmp/reports/red/${RESOLVED_OP_ID}.md" "{{.OUTPUT_DIR}}/red/${RESOLVED_OP_ID}.md" 2>/dev/null || true
          if [ -f "{{.OUTPUT_DIR}}/red/${RESOLVED_OP_ID}.md" ]; then
            echo "Report saved to: {{.OUTPUT_DIR}}/red/${RESOLVED_OP_ID}.md"
          fi
        fi

  reports:list:
    desc: List saved red team reports
    silent: true
    vars:
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
    cmds:
      - |
        echo "Red Team Reports:"
        echo "================="
        if [ -d "{{.OUTPUT_DIR}}/red" ]; then
          ls -lht "{{.OUTPUT_DIR}}/red/"*.md 2>/dev/null || echo "No reports found"
        else
          echo "Report directory not found: {{.OUTPUT_DIR}}/red"
        fi

  reports:latest:
    desc: Show the latest red team report
    silent: true
    vars:
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
    cmds:
      - |
        LATEST=$(ls -t "{{.OUTPUT_DIR}}/red/"*.md 2>/dev/null | head -1)
        if [ -n "$LATEST" ]; then
          echo "Latest report: $LATEST"
          echo "===================="
          cat "$LATEST"
        else
          echo "No reports found in {{.OUTPUT_DIR}}/red"
        fi

  multi:watch:
    desc: "Poll red operation status and auto-fetch reports (usage: task red:multi:watch [OPERATION_ID=op-xxx] [LATEST=true] [POLL_INTERVAL=30] [ONCE=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "true"}}'
      POLL_INTERVAL: '{{.POLL_INTERVAL | default "30"}}'
      MAX_WAIT: '{{.MAX_WAIT | default "7200"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
      ONCE: '{{.ONCE | default "false"}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}" || test "{{.LATEST}}" = "true"
        msg: "Either OPERATION_ID or LATEST=true is required"
    cmds:
      - cmd: mkdir -p "{{.OUTPUT_DIR}}"
        silent: true
      - |
        OP_ARG=""
        LATEST_FLAG=""
        if [ -n "{{.OPERATION_ID}}" ]; then
          OP_ARG="{{.OPERATION_ID}}"
        else
          LATEST_FLAG="--latest"
        fi

        START=$(date +%s)
        FETCHED_OPS=""
        echo "Watching red operation status (poll={{.POLL_INTERVAL}}s, max_wait={{.MAX_WAIT}}s)"
        echo "Reports will be fetched to {{.OUTPUT_DIR}}/red/"

        while true; do
          ELAPSED=$(( $(date +%s) - START ))
          if [ $ELAPSED -gt {{.MAX_WAIT}} ]; then
            echo "ERROR: Max wait ({{.MAX_WAIT}}s) exceeded"
            exit 1
          fi

          STATUS_OUT=$({{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops status $OP_ARG $LATEST_FLAG 2>&1 || true)
          STATUS=$(echo "$STATUS_OUT" | grep -E '^Status: ' | head -1 | awk '{print $2}')
          RESOLVED_OP=$(echo "$STATUS_OUT" | grep -E '^Operation: ' | head -1 | awk '{print $2}')

          if [ -z "$STATUS" ]; then
            echo "[${ELAPSED}s] no status yet (waiting for op to register)"
          else
            echo "[${ELAPSED}s] op=${RESOLVED_OP:-?} status=$STATUS"
            case "$STATUS" in
              completed|stopped)
                if [ -z "$RESOLVED_OP" ]; then
                  echo "ERROR: Could not resolve operation ID; cannot fetch report"
                  exit 1
                fi

                if echo " $FETCHED_OPS " | grep -q " $RESOLVED_OP "; then
                  echo "Report already fetched for $RESOLVED_OP"
                else
                  echo "Fetching report for $RESOLVED_OP..."
                  task red:multi:report OPERATION_ID="$RESOLVED_OP" OUTPUT_DIR="{{.OUTPUT_DIR}}"
                  FETCHED_OPS="$FETCHED_OPS $RESOLVED_OP"
                fi

                if [ "{{.ONCE}}" = "true" ]; then
                  exit 0
                fi
                ;;
              failed|cancelled)
                if [ -n "$RESOLVED_OP" ]; then
                  echo "Operation reached terminal state: $STATUS; fetching best-effort report"
                  task red:multi:report OPERATION_ID="$RESOLVED_OP" OUTPUT_DIR="{{.OUTPUT_DIR}}" || true
                fi
                exit 1
                ;;
            esac
          fi

          sleep {{.POLL_INTERVAL}}
        done

  multi:list:
    desc: "List multi-agent operations and their state"
    silent: true
    cmds:
      - '{{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops queue'

  multi:cleanup:
    desc: "Clean up old multi-agent operation checkpoints (usage: task red:multi:cleanup [MAX_AGE_HOURS=24])"
    silent: true
    vars:
      MAX_AGE_HOURS: '{{.MAX_AGE_HOURS | default "24"}}'
    cmds:
      - '{{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops cleanup --max-age-hours {{.MAX_AGE_HOURS}}'

  multi:delete:
    desc: "Delete a specific operation and all its data (usage: task red:multi:delete OPERATION_ID=op-xxx)"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
    cmds:
      - '{{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops delete "{{.OPERATION_ID}}" --force'

  multi:kill:
    desc: "Kill running operations and restart workers to stop token burn (usage: task red:multi:kill [OPERATION_ID=op-xxx] [ALL=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      ALL: '{{.ALL | default "false"}}'
    cmds:
      # CLI handles: list running, keep-latest logic, stop+delete
      - cmd: >-
          {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops kill
          {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
          {{if eq .ALL "true"}}--all{{end}}
      # Restart workers to immediately stop in-flight LLM calls burning tokens
      - cmd: |
          echo ""
          echo "=== Restarting workers to stop in-flight token burn ==="
          RED_WORKERS=$(kubectl get statefulsets -n {{.K8S_NAMESPACE}} -o name | grep -v -E 'blue|redis' | sed 's|statefulset.apps/||')
          for sts in $RED_WORKERS; do
            kubectl rollout restart statefulset "$sts" -n {{.K8S_NAMESPACE}}
          done
          echo "Waiting for workers to terminate..."
          for sts in $RED_WORKERS; do
            kubectl rollout status statefulset "$sts" -n {{.K8S_NAMESPACE}} --timeout=120s 2>/dev/null || true
          done
          echo "All workers restarted. Token burn stopped."

  multi:backfill-domains:
    desc: "Backfill domain list into Redis state (usage: task red:multi:backfill-domains OPERATION_ID=op-xxx)"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
    cmds:
      - '{{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops backfill-domains "{{.OPERATION_ID}}"'

  multi:inject-credential:
    desc: "Inject a credential into operation shared state (usage: task red:multi:inject-credential OPERATION_ID=op-xxx USERNAME=testuser PASSWORD=secret [DOMAIN=contoso.local])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      USERNAME: '{{.USERNAME | default ""}}'
      PASSWORD: '{{.PASSWORD | default ""}}'
      DOMAIN: '{{.DOMAIN | default ""}}'
      SOURCE: '{{.SOURCE | default "manual-inject"}}'
      IS_ADMIN: '{{.IS_ADMIN | default "false"}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
      - sh: test -n "{{.USERNAME}}"
        msg: "USERNAME variable is required"
      - sh: test -n "{{.PASSWORD}}"
        msg: "PASSWORD variable is required"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops inject-credential
        "{{.OPERATION_ID}}" "{{.USERNAME}}" "{{.PASSWORD}}"
        {{if ne .DOMAIN ""}}--domain "{{.DOMAIN}}"{{end}}
        --source "{{.SOURCE}}"
        {{if eq .IS_ADMIN "true"}}--is-admin{{end}}

  multi:inject-hash:
    desc: "Inject an NTLM hash into operation shared state (usage: task red:multi:inject-hash OPERATION_ID=op-xxx USERNAME=krbtgt HASH=aad3b...:313b... [DOMAIN=contoso.local] [AES_KEY=f8b6...])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      USERNAME: '{{.USERNAME | default ""}}'
      HASH: '{{.HASH | default ""}}'
      DOMAIN: '{{.DOMAIN | default ""}}'
      AES_KEY: '{{.AES_KEY | default ""}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
      - sh: test -n "{{.USERNAME}}"
        msg: "USERNAME variable is required"
      - sh: test -n "{{.HASH}}"
        msg: "HASH variable is required"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops inject-hash
        "{{.OPERATION_ID}}" "{{.USERNAME}}" "{{.HASH}}"
        {{if ne .DOMAIN ""}}--domain "{{.DOMAIN}}"{{end}}
        {{if ne .AES_KEY ""}}--aes-key "{{.AES_KEY}}"{{end}}

  multi:inject-host:
    desc: "Inject a host into operation shared state (usage: task red:multi:inject-host OPERATION_ID=op-xxx IP=192.168.58.20 HOSTNAME=dc01.essos.local [DC=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      IP: '{{.IP | default ""}}'
      HOSTNAME: '{{.HOSTNAME | default ""}}'
      DC: '{{.DC | default "false"}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
      - sh: test -n "{{.IP}}"
        msg: "IP variable is required"
      - sh: test -n "{{.HOSTNAME}}"
        msg: "HOSTNAME variable is required"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops inject-host
        "{{.OPERATION_ID}}" "{{.IP}}" "{{.HOSTNAME}}"
        {{if eq .DC "true"}}--dc{{end}}

  multi:inject-domain-sid:
    desc: "Inject a domain SID into operation shared state (usage: task red:multi:inject-domain-sid OPERATION_ID=op-xxx DOMAIN=north.sevenkingdoms.local SID=S-1-5-21-...)"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      DOMAIN: '{{.DOMAIN | default ""}}'
      SID: '{{.SID | default ""}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
      - sh: test -n "{{.DOMAIN}}"
        msg: "DOMAIN variable is required"
      - sh: test -n "{{.SID}}"
        msg: "SID variable is required"
    cmds:
      - '{{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops inject-domain-sid "{{.OPERATION_ID}}" "{{.DOMAIN}}" "{{.SID}}"'

  multi:inject-vulnerability:
    desc: "Inject a vulnerability into operation shared state (usage: task red:multi:inject-vulnerability OPERATION_ID=op-xxx VULN_TYPE=constrained_delegation TARGET_IP=10.1.2.240 ...)"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      VULN_TYPE: '{{.VULN_TYPE | default ""}}'
      TARGET_IP: '{{.TARGET_IP | default ""}}'
      TARGET_HOSTNAME: '{{.TARGET_HOSTNAME | default ""}}'
      TARGET_SPN: '{{.TARGET_SPN | default ""}}'
      ACCOUNT_NAME: '{{.ACCOUNT_NAME | default ""}}'
      DOMAIN: '{{.DOMAIN | default ""}}'
      DETAILS: '{{.DETAILS | default "{}"}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
      - sh: test -n "{{.VULN_TYPE}}"
        msg: "VULN_TYPE variable is required (e.g., constrained_delegation, esc8, smb_signing_disabled)"
      - sh: test -n "{{.TARGET_IP}}"
        msg: "TARGET_IP variable is required"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops inject-vulnerability
        "{{.OPERATION_ID}}" "{{.VULN_TYPE}}" "{{.TARGET_IP}}"
        {{if ne .TARGET_HOSTNAME ""}}--target-hostname "{{.TARGET_HOSTNAME}}"{{end}}
        {{if ne .TARGET_SPN ""}}--target-spn "{{.TARGET_SPN}}"{{end}}
        {{if ne .ACCOUNT_NAME ""}}--account-name "{{.ACCOUNT_NAME}}"{{end}}
        {{if ne .DOMAIN ""}}--domain "{{.DOMAIN}}"{{end}}
        --details '{{.DETAILS}}'

  multi:inject-trust:
    desc: "Inject a trust relationship into operation shared state (usage: task red:multi:inject-trust OPERATION_ID=op-xxx DOMAIN=essos.local [TRUST_TYPE=forest] [DIRECTION=bidirectional] [FLAT_NAME=ESSOS])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      DOMAIN: '{{.DOMAIN | default ""}}'
      TRUST_TYPE: '{{.TRUST_TYPE | default "forest"}}'
      DIRECTION: '{{.DIRECTION | default "bidirectional"}}'
      FLAT_NAME: '{{.FLAT_NAME | default ""}}'
      SID_FILTERING: '{{.SID_FILTERING | default "false"}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
      - sh: test -n "{{.DOMAIN}}"
        msg: "DOMAIN variable is required"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops inject-trust
        "{{.OPERATION_ID}}" "{{.DOMAIN}}"
        --trust-type "{{.TRUST_TYPE}}"
        --direction "{{.DIRECTION}}"
        {{if ne .FLAT_NAME ""}}--flat-name "{{.FLAT_NAME}}"{{end}}
        {{if eq .SID_FILTERING "true"}}--sid-filtering{{end}}

  multi:force-inter-realm-forge:
    desc: "Operator escape hatch: force an inter-realm ticket forge, bypassing the SID-filter check and trust_follow dedup (usage: task red:multi:force-inter-realm-forge OPERATION_ID=op-xxx SOURCE=north.sevenkingdoms.local TARGET=essos.local TRUST_KEY=<nthash> [AES_KEY=<aes>] [SOURCE_SID=<sid>] [TARGET_SID=<sid>] [TARGET_DC_IP=10.4.6.159] [TARGET_DC_FQDN=meereen.essos.local])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      SOURCE: '{{.SOURCE | default ""}}'
      TARGET: '{{.TARGET | default ""}}'
      TRUST_KEY: '{{.TRUST_KEY | default ""}}'
      AES_KEY: '{{.AES_KEY | default ""}}'
      SOURCE_SID: '{{.SOURCE_SID | default ""}}'
      TARGET_SID: '{{.TARGET_SID | default ""}}'
      TARGET_DC_IP: '{{.TARGET_DC_IP | default ""}}'
      TARGET_DC_FQDN: '{{.TARGET_DC_FQDN | default ""}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
      - sh: test -n "{{.SOURCE}}"
        msg: "SOURCE variable is required (source forest, e.g. north.sevenkingdoms.local)"
      - sh: test -n "{{.TARGET}}"
        msg: "TARGET variable is required (target forest, e.g. essos.local)"
      - sh: test -n "{{.TRUST_KEY}}"
        msg: "TRUST_KEY variable is required (NT hash of source\\TARGET$ trust account)"
    cmds:
      - >-
        {{.ARES_CLI}} --k8s {{.K8S_NAMESPACE}} ops force-inter-realm-forge
        "{{.OPERATION_ID}}"
        --source "{{.SOURCE}}"
        --target "{{.TARGET}}"
        --trust-key "{{.TRUST_KEY}}"
        {{if ne .AES_KEY ""}}--aes-key "{{.AES_KEY}}"{{end}}
        {{if ne .SOURCE_SID ""}}--source-sid "{{.SOURCE_SID}}"{{end}}
        {{if ne .TARGET_SID ""}}--target-sid "{{.TARGET_SID}}"{{end}}
        {{if ne .TARGET_DC_IP ""}}--target-dc-ip "{{.TARGET_DC_IP}}"{{end}}
        {{if ne .TARGET_DC_FQDN ""}}--target-dc-fqdn "{{.TARGET_DC_FQDN}}"{{end}}

  multi:inject-essos:
    desc: "Inject essos.local forest state into a running operation (usage: task red:multi:inject-essos OPERATION_ID=op-xxx)"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      # Resolve essos host IPs from AWS EC2 at runtime (deterministic — newest
      # instance wins if the tag glob matches more than one).
      MEEREEN_IP:
        sh: |
          export AWS_PROFILE="{{.TARGET_PROFILE}}"
          export AWS_REGION="{{.TARGET_REGION}}"
          . .taskfiles/ec2/scripts/run-ssm.sh
          resolve_instance_ip meereen || true
      BRAAVOS_IP:
        sh: |
          export AWS_PROFILE="{{.TARGET_PROFILE}}"
          export AWS_REGION="{{.TARGET_REGION}}"
          . .taskfiles/ec2/scripts/run-ssm.sh
          resolve_instance_ip braavos || true
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
      - sh: test -n "{{.MEEREEN_IP}}"
        msg: "Could not resolve meereen IP from AWS EC2 (profile={{.TARGET_PROFILE}}, region={{.TARGET_REGION}})"
      - sh: test -n "{{.BRAAVOS_IP}}"
        msg: "Could not resolve braavos IP from AWS EC2 (profile={{.TARGET_PROFILE}}, region={{.TARGET_REGION}})"
    cmds:
      - cmd: |
          echo "Injecting essos.local forest state into operation {{.OPERATION_ID}}"
          echo "  meereen DC: {{.MEEREEN_IP}}"
          echo "  braavos:    {{.BRAAVOS_IP}}"
          echo ""

      # 1. Inject trust relationship (essos.local is a separate forest with bidirectional trust)
      - task: multi:inject-trust
        vars:
          OPERATION_ID: "{{.OPERATION_ID}}"
          DOMAIN: "essos.local"
          TRUST_TYPE: "forest"
          DIRECTION: "bidirectional"
          FLAT_NAME: "ESSOS"
          SID_FILTERING: "true"

      # 2. Inject hosts (meereen is the essos.local DC)
      - task: multi:inject-host
        vars:
          OPERATION_ID: "{{.OPERATION_ID}}"
          IP: "{{.MEEREEN_IP}}"
          HOSTNAME: "meereen.essos.local"
          DC: "true"

      - task: multi:inject-host
        vars:
          OPERATION_ID: "{{.OPERATION_ID}}"
          IP: "{{.BRAAVOS_IP}}"
          HOSTNAME: "braavos.essos.local"

      # 3. Inject MSSQL vulnerability on braavos
      - task: multi:inject-vulnerability
        vars:
          OPERATION_ID: "{{.OPERATION_ID}}"
          VULN_TYPE: "mssql_access"
          TARGET_IP: "{{.BRAAVOS_IP}}"
          TARGET_HOSTNAME: "braavos.essos.local"
          DOMAIN: "essos.local"
          DETAILS: '{"service": "MSSQL", "port": "1433", "note": "MSSQL on braavos — check impersonation and linked servers to castelblack"}'

      - cmd: |
          echo ""
          echo "Essos state injected. The orchestrator will now:"
          echo "  - See essos.local as an undominated forest"
          echo "  - Run AS-REP roast and Kerberoast against essos.local"
          echo "  - Attempt trust key extraction and cross-forest exploitation"
          echo ""
          echo "Monitor: task red:multi:loot OPERATION_ID={{.OPERATION_ID}} WATCH=5"

  multi:fast-essos:
    desc: "Run a GOAD operation with essos.local forest targeting (usage: task red:multi:fast-essos [MODEL=gpt-5.2])"
    silent: true
    vars:
      OPERATION_ID:
        sh: echo "op-essos-$(date +%Y%m%d-%H%M%S)"
    cmds:
      # 1. Submit operation targeting all GOAD hosts
      - task: multi
        vars:
          TARGET: "dreadgoad"
          DOMAIN: "sevenkingdoms.local"
          OPERATION_ID: "{{.OPERATION_ID}}"

      # 2. Wait for operation to initialize in Redis
      - cmd: |
          echo ""
          echo "Waiting 15s for operation {{.OPERATION_ID}} to initialize..."
          sleep 15

      # 3. Inject essos.local state
      - task: multi:inject-essos
        vars:
          OPERATION_ID: "{{.OPERATION_ID}}"

      - cmd: |
          echo ""
          echo "Fast-essos operation started: {{.OPERATION_ID}}"
          echo "Targets: sevenkingdoms.local + essos.local (cross-forest)"
          echo ""
          echo "Monitor:"
          echo "  task red:multi:loot OPERATION_ID={{.OPERATION_ID}} WATCH=5"
          echo "  task red:multi:status"

  # ===========================================================================
  # Shell-based tasks (cannot be moved to Python)
  # ===========================================================================

  multi:resume:
    desc: "Resume a multi-agent operation from checkpoint (usage: task red:multi:resume OPERATION_ID=op-xxx DOMAIN=target.local TARGETS=192.168.56.10)"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      DOMAIN: '{{.DOMAIN | default ""}}'
      TARGETS: '{{.TARGETS | default ""}}'
    preconditions:
      - sh: test -n "{{.OPERATION_ID}}"
        msg: "OPERATION_ID variable is required"
      - sh: test -n "{{.DOMAIN}}"
        msg: "DOMAIN variable is required"
      - sh: test -n "{{.TARGETS}}"
        msg: "TARGETS variable is required"
    cmds:
      - task: multi
        vars:
          OPERATION_ID: "{{.OPERATION_ID}}"
          DOMAIN: "{{.DOMAIN}}"
          TARGET: "{{.TARGETS}}"
          RESUME: "true"

  # ===========================================================================
  # EC2 (SSM) — run operation on EC2 instead of K8s
  # ===========================================================================

  ec2:multi:
    desc: "Run multi-agent red team operation on EC2 via SSM (usage: task red:ec2:multi [TARGET=dreadgoad] [DOMAIN=contoso.local] [EC2_NAME=ares-tools])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      RESUME: '{{.RESUME | default "false"}}'
      TARGET_ENV: '{{.TARGET_ENV | default "staging"}}'
      EC2_NAME: '{{.EC2_NAME | default "kali-ares"}}'
      AWS_PROFILE: '{{.AWS_PROFILE | default (env "AWS_PROFILE") | default "lab"}}'
      AWS_REGION: '{{.AWS_REGION | default (env "AWS_REGION") | default (env "AWS_DEFAULT_REGION") | default "us-west-1"}}'
      BLUE_ENABLED: '{{.BLUE_ENABLED | default "1"}}'
      BLUE_LLM_MODEL: '{{.BLUE_LLM_MODEL | default ""}}'
      # Box-context obs endpoints — plundr defaults are reachable from
      # kali-ares (verified TCP:443 + /api/v1/labels 200). Distinct from
      # GRAFANA_URL/LOKI_URL which remain the laptop's obs:forward localhost.
      EC2_GRAFANA_URL: '{{.EC2_GRAFANA_URL | default "https://grafana.dev.plundr.ai"}}'
      EC2_LOKI_URL: '{{.EC2_LOKI_URL | default "https://loki.dev.plundr.ai"}}'
      EC2_DEPLOYMENT: '{{.EC2_DEPLOYMENT | default "alpha-operator-range"}}'
      STRATEGY: '{{.STRATEGY | default "comprehensive"}}'
      RESOLVED_TARGETS:
        sh: |
          TARGET="{{.TARGET}}"
          if echo "$TARGET" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "$TARGET"
          else
            aws ec2 describe-instances \
              --profile "{{.TARGET_PROFILE}}" \
              --region "{{.TARGET_REGION}}" \
              --filters "Name=instance-state-name,Values=running" \
              --query "Reservations[*].Instances[?contains(Tags[?Key==\`Name\`].Value|[0], \`$TARGET\`)].PrivateIpAddress" \
              --output text | tr '\t\n' ',' | sed 's/,$//'
          fi
      OPERATION_ID_COMPUTED:
        sh: |
          if [ -n "{{.OPERATION_ID}}" ]; then
            echo "{{.OPERATION_ID}}"
          else
            echo "op-$(date +%Y%m%d-%H%M%S)"
          fi
      LOGFILE:
        sh: echo "{{.LOG_DIR}}/red-ec2-{{.OPERATION_ID_COMPUTED}}-$(date +%Y%m%d-%H%M%S).log"
    preconditions:
      - sh: test -n "{{.TARGET}}"
        msg: "TARGET variable is required. Usage: task red:ec2:multi TARGET=dreadgoad"
      - sh: test -n "{{.RESOLVED_TARGETS}}"
        msg: "No running EC2 instances found matching Name tag filter: {{.TARGET}}"
      - sh: test -f .env
        msg: ".env file required for API keys"
    cmds:
      # Show operation details
      - cmd: |
          TARGET="{{.TARGET}}"
          if echo "$TARGET" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Using direct IP(s): {{.RESOLVED_TARGETS}}"
          else
            echo "Resolved '{{.TARGET}}' via AWS EC2 ({{.TARGET_PROFILE}}/{{.TARGET_REGION}})"
            TARGET_COUNT=$(echo "{{.RESOLVED_TARGETS}}" | tr ',' '\n' | wc -l | xargs)
            echo "Found $TARGET_COUNT target(s): {{.RESOLVED_TARGETS}}"
          fi

          echo ""
          echo "Operation ID: {{.OPERATION_ID_COMPUTED}}"
          echo "Target domain: {{.DOMAIN}}"
          echo "Target IPs: {{.RESOLVED_TARGETS}}"
          echo "Deploy mode: EC2 (SSM)"
          echo "EC2 Name tag: {{.EC2_NAME}}"
          if [ "{{.RESUME}}" = "true" ]; then
            echo "Resuming from checkpoint"
          fi
          echo "Logging to: {{.LOGFILE}}"
          echo ""
        silent: false

      # Create log directory
      - cmd: mkdir -p {{.LOG_DIR}}
        silent: true

      # Resolve EC2 instance
      - cmd: |
          set -euo pipefail

          export AWS_PROFILE="{{.AWS_PROFILE}}"
          export AWS_REGION="{{.AWS_REGION}}"
          . .taskfiles/ec2/scripts/run-ssm.sh
          INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1
          echo "EC2 instance: $INSTANCE_ID"

          # Set active operation pointer in Redis via SSM
          echo "Setting active operation pointer in Redis..."
          run_ssm_cmd "$INSTANCE_ID" \
            "redis-cli set ares:operation:active {{.OPERATION_ID_COMPUTED}}" 30 >/dev/null || {
            echo "ERROR: Failed to set active operation in Redis"
            exit 1
          }
          echo "Set ares:operation:active -> {{.OPERATION_ID_COMPUTED}}"
        silent: false

      # Submit operation via SSM: run ares-orchestrator on EC2
      - cmd: |
          set -euo pipefail
          set -a
          . ./.env
          set +a

          export AWS_PROFILE="{{.AWS_PROFILE}}"
          export AWS_REGION="{{.AWS_REGION}}"
          . .taskfiles/ec2/scripts/run-ssm.sh
          INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

          echo "Submitting operation to EC2 orchestrator..."

          # Build JSON payload for ARES_OPERATION_ID
          TARGET_IPS_JSON=$(echo "{{.RESOLVED_TARGETS}}" | tr ',' '\n' | sed 's/^/"/;s/$/"/' | paste -sd, - | sed 's/^/[/;s/$/]/')

          ORCH_PAYLOAD="{\"operation_id\":\"{{.OPERATION_ID_COMPUTED}}\",\"target_domain\":\"{{.DOMAIN}}\",\"target_ips\":${TARGET_IPS_JSON},\"model\":\"{{.MODEL}}\",\"strategy\":\"{{.STRATEGY}}\"}"

          # Build orchestrator launch script from template
          ORCH_SCRIPT=$(mktemp)
          trap 'rm -f "$ORCH_SCRIPT"' EXIT
          sed -e "s|__ARES_PAYLOAD__|${ORCH_PAYLOAD}|" \
              -e "s|__OPENAI_API_KEY__|${OPENAI_API_KEY:-}|" \
              -e "s|__ANTHROPIC_API_KEY__|${ANTHROPIC_API_KEY:-}|" \
              -e "s|__DREADNODE_API_KEY__|${DREADNODE_API_KEY:-}|" \
              -e "s|__DREADNODE_SERVER_URL__|{{.DREADNODE_SERVER_URL}}|" \
              -e "s|__DREADNODE_ORGANIZATION__|{{.DREADNODE_ORGANIZATION}}|" \
              -e "s|__DREADNODE_WORKSPACE__|{{.DREADNODE_WORKSPACE}}|" \
              -e "s|__DREADNODE_PROJECT__|{{.DREADNODE_PROJECT}}|" \
              -e "s|__GRAFANA_TOKEN__|${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}|" \
              -e "s|__GRAFANA_URL__|{{.EC2_GRAFANA_URL}}|" \
              -e "s|__LOKI_URL__|{{.EC2_LOKI_URL}}|" \
              -e "s|__ARES_LLM_MODEL__|{{.MODEL}}|" \
              -e "s|__ARES_BLUE_ENABLED__|{{.BLUE_ENABLED}}|" \
              -e "s|__ARES_BLUE_LLM_MODEL__|{{.BLUE_LLM_MODEL}}|" \
              -e "s|__ARES_DEPLOYMENT__|{{.EC2_DEPLOYMENT}}|" \
              -e "s|__OTEL_TRACES_ENDPOINT__|{{.OTEL_TRACES_ENDPOINT}}|" \
              .taskfiles/ec2/scripts/launch-orchestrator.sh.tmpl > "$ORCH_SCRIPT"

          if OUTPUT=$(run_ssm_cmd "$INSTANCE_ID" "$(cat "$ORCH_SCRIPT")" 30); then
            echo "$OUTPUT" | tee -a "{{.LOGFILE}}"
          else
            echo "ERROR: Failed to start orchestrator on $INSTANCE_ID" | tee -a "{{.LOGFILE}}" >&2
            exit 1
          fi

          echo ""
          echo "Operation {{.OPERATION_ID_COMPUTED}} submitted on EC2"
          echo ""
          echo "Monitor with:"
          echo "  task ec2:logs EC2_NAME={{.EC2_NAME}} ROLE=orchestrator"
          echo "  task ec2:redis:forward EC2_NAME={{.EC2_NAME}}  # then:"
          echo "  ARES_REDIS_URL=redis://localhost:16379 ares ops loot --latest"
        silent: false
        ignore_error: true

  # ===========================================================================
  # Replay Recording Tasks
  # ===========================================================================

  multi:replay:copy:
    desc: "Copy replay recordings from agent pods (usage: task red:multi:replay:copy [ROLE=recon] [OUTPUT_DIR=./recordings])"
    silent: true
    vars:
      ROLE: '{{.ROLE | default ""}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./recordings"}}'
      AGENTS: "recon credential-access lateral-movement coercion acl cracker privesc"
    cmds:
      - |
        mkdir -p "{{.OUTPUT_DIR}}"

        if [ -n "{{.ROLE}}" ]; then
          # Copy from specific agent
          AGENT_NAME="{{.ROLE}}"
          # Normalize role name to pod name format (e.g., credential_access -> credential-access)
          POD_ROLE=$(echo "$AGENT_NAME" | tr '_' '-')
          POD="ares-${POD_ROLE}-agent-0"

          echo "Copying recording from $POD..."
          if kubectl cp "{{.K8S_NAMESPACE}}/${POD}:/ares/replay/recording.jsonl" "{{.OUTPUT_DIR}}/${POD_ROLE}-recording.jsonl" 2>/dev/null; then
            FILE_SIZE=$(ls -lh "{{.OUTPUT_DIR}}/${POD_ROLE}-recording.jsonl" 2>/dev/null | awk '{print $5}')
            echo "  ✓ Copied ${POD_ROLE}-recording.jsonl ($FILE_SIZE)"
          else
            echo "  ✗ No recording found for ${POD_ROLE}"
          fi
        else
          # Copy from all agents
          echo "Copying recordings from all agents to {{.OUTPUT_DIR}}/"
          echo ""

          for agent in {{.AGENTS}}; do
            POD="ares-${agent}-agent-0"
            if kubectl cp "{{.K8S_NAMESPACE}}/${POD}:/ares/replay/recording.jsonl" "{{.OUTPUT_DIR}}/${agent}-recording.jsonl" 2>/dev/null; then
              FILE_SIZE=$(ls -lh "{{.OUTPUT_DIR}}/${agent}-recording.jsonl" 2>/dev/null | awk '{print $5}')
              echo "  ✓ Copied ${agent}-recording.jsonl ($FILE_SIZE)"
            else
              echo "  ✗ No recording for ${agent}"
            fi
          done
        fi

        echo ""
        echo "Recordings saved to {{.OUTPUT_DIR}}/"

  multi:replay:cat:
    desc: "Stream replay recording contents from an agent pod (usage: task red:multi:replay:cat ROLE=recon)"
    silent: true
    vars:
      ROLE: '{{.ROLE | default "recon"}}'
    cmds:
      - |
        POD_ROLE=$(echo "{{.ROLE}}" | tr '_' '-')
        POD="ares-${POD_ROLE}-agent-0"

        echo "# Streaming recording from $POD..."
        echo "# ========================================"
        kubectl exec -n {{.K8S_NAMESPACE}} "$POD" -- cat /ares/replay/recording.jsonl 2>/dev/null || \
          echo "No recording found for ${POD_ROLE}"

  multi:replay:list:
    desc: "List replay recordings available on agent pods"
    silent: true
    vars:
      AGENTS: "recon credential-access lateral-movement coercion acl cracker privesc"
    cmds:
      - |
        echo "Replay recordings in {{.K8S_NAMESPACE}}:"
        echo "========================================"

        for agent in {{.AGENTS}}; do
          POD="ares-${agent}-agent-0"
          INFO=$(kubectl exec -n {{.K8S_NAMESPACE}} "$POD" -- ls -lh /ares/replay/recording.jsonl 2>/dev/null || true)
          if [ -n "$INFO" ]; then
            SIZE=$(echo "$INFO" | awk '{print $5}')
            DATE=$(echo "$INFO" | awk '{print $6, $7, $8}')
            echo "  ✓ ${agent}: $SIZE ($DATE)"
          else
            echo "  - ${agent}: (no recording)"
          fi
        done

  multi:replay:clear:
    desc: "Clear replay recordings from agent pods (usage: task red:multi:replay:clear [ROLE=recon] [CONFIRM=true])"
    silent: true
    vars:
      ROLE: '{{.ROLE | default ""}}'
      CONFIRM: '{{.CONFIRM | default "false"}}'
      AGENTS: "recon credential-access lateral-movement coercion acl cracker privesc"
    preconditions:
      - sh: test "{{.CONFIRM}}" = "true"
        msg: "This will delete replay recordings. Re-run with CONFIRM=true to proceed."
    cmds:
      - |
        if [ -n "{{.ROLE}}" ]; then
          POD_ROLE=$(echo "{{.ROLE}}" | tr '_' '-')
          POD="ares-${POD_ROLE}-agent-0"

          echo "Clearing recording from $POD..."
          if kubectl exec -n {{.K8S_NAMESPACE}} "$POD" -- rm -f /ares/replay/recording.jsonl 2>/dev/null; then
            echo "  ✓ Cleared ${POD_ROLE}"
          else
            echo "  ✗ Failed to clear ${POD_ROLE}"
          fi
        else
          echo "Clearing recordings from all agents..."

          for agent in {{.AGENTS}}; do
            POD="ares-${agent}-agent-0"
            if kubectl exec -n {{.K8S_NAMESPACE}} "$POD" -- rm -f /ares/replay/recording.jsonl 2>/dev/null; then
              echo "  ✓ Cleared ${agent}"
            else
              echo "  - ${agent}: (no recording or failed)"
            fi
          done
        fi

        echo ""
        echo "Done."
