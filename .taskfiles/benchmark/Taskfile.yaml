---
# Benchmark replay-stack provisioning tasks.
#
# `ares benchmark run` is the multi-agent runtime — it submits an investigation
# to NATS, polls Redis for completion, and computes the score. It does NOT
# provision, verify, or tear down the replay stack; that AWS-CLI orchestration
# lives here so the boundary matches the rest of the repo (ec2, k8s, remote).
#
# The AMI is produced by the ares-replay-stack warpgate template
# (warpgate-templates/templates/ares-replay-stack/). It comes pre-loaded with
# Docker, all 6 replay-stack images, and the stack config at /opt/replay-stack/.
#
# Usage:
#   task benchmark:replay OP_ID=op-20260706-1200 SNAPSHOT_DIR=./snapshots
#     provision → ares benchmark run --stack-ip <ip> → teardown (deferred)
#
#   task benchmark:replay:provision OP_ID=op-20260706-1200
#     just provisions and prints the stack IP + instance ID (for manual use)
#
#   task benchmark:replay:run STACK_IP=192.168.58.5 OP_ID=op-20260706-1200
#     runs one investigation against an already-provisioned stack — no teardown.
#     Use this when a tuning driver (e.g. Vibe Gepa) wants to keep the stack
#     warm across many `ares benchmark run` invocations.
#
#   task benchmark:replay:loop OP_ID=op-20260706-1200 ITERATIONS=10
#     provision → N x (run [→ HOOK]) → teardown. The optional HOOK= command
#     runs between iterations with STACK_IP, OP_ID, and ITERATION exported,
#     so a tuning driver can rewrite prompts / config in place. Omit HOOK to
#     just repeat the same investigation N times (useful for K-of-N averaging).
#
#     Example (Vibe Gepa driver):
#       task benchmark:replay:loop OP_ID=op-... ITERATIONS=8 \
#         HOOK='python -m vibe_gepa.update --op-id "$OP_ID" --iter "$ITERATION"'
#
#   task benchmark:replay:teardown INSTANCE_ID=i-abc123
#     terminates a provisioned stack
version: "3"

set: [errexit, pipefail]

vars:
  ARES_CLI: '{{.ARES_CLI | default "./target/release/ares"}}'
  INFO: '\033[0;34m[INFO]\033[0m'
  SUCCESS: '\033[0;32m[SUCCESS]\033[0m'
  ERROR: '\033[0;31m[ERROR]\033[0m'
  WARN: '\033[1;33m[WARN]\033[0m'
  AWS_PROFILE: '{{.AWS_PROFILE | default (env "AWS_PROFILE") | default "lab"}}'
  AWS_REGION: '{{.BENCHMARK_AWS_REGION | default (env "BENCHMARK_AWS_REGION") | default "us-west-1"}}'
  INSTANCE_TYPE: '{{.BENCHMARK_INSTANCE_TYPE | default (env "BENCHMARK_INSTANCE_TYPE") | default "t3.medium"}}'
  # Required for provisioning; see .env.example.
  SECURITY_GROUP_ID: '{{.BENCHMARK_SECURITY_GROUP_ID | default (env "BENCHMARK_SECURITY_GROUP_ID") | default ""}}'
  INSTANCE_PROFILE: '{{.BENCHMARK_INSTANCE_PROFILE | default (env "BENCHMARK_INSTANCE_PROFILE") | default ""}}'
  SUBNET_ID: '{{.BENCHMARK_SUBNET_ID | default (env "BENCHMARK_SUBNET_ID") | default ""}}'
  # S3 bucket for snapshot data.
  S3_BUCKET: '{{.BENCHMARK_S3_BUCKET | default (env "BENCHMARK_S3_BUCKET") | default "ares-benchmark-us-west-1"}}'
  # Set BENCHMARK_REQUIRE_BAKED_AMI=1 to error out if no ares-replay-stack AMI
  # is published (skips the stock-AL2023 fallback path).
  REQUIRE_BAKED_AMI: '{{.BENCHMARK_REQUIRE_BAKED_AMI | default (env "BENCHMARK_REQUIRE_BAKED_AMI") | default "0"}}'

tasks:
  replay:
    desc: End-to-end replay — provision stack, run investigation, tear down.
    requires:
      vars: [OP_ID]
    vars:
      SNAPSHOT_DIR: '{{.SNAPSHOT_DIR | default ""}}'
      MODEL: '{{.MODEL | default ""}}'
      MAX_STEPS: '{{.MAX_STEPS | default "50"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
      QUIET_PERIOD: '{{.QUIET_PERIOD | default ""}}'
      CLOCK: '{{.CLOCK | default "step"}}'
      REPLAY_MODE: '{{.REPLAY_MODE | default "timeline"}}'
      TRIGGER_MODE: '{{.TRIGGER_MODE | default "alert-replay"}}'
    cmds:
      - |
        echo -e "{{.INFO}} provisioning replay stack for {{.OP_ID}}..."
        PROV_OUT=$(task benchmark:replay:provision OP_ID={{.OP_ID}})
        STACK_IP=$(echo "$PROV_OUT" | awk -F= '/^STACK_IP=/{print $2}')
        INSTANCE_ID=$(echo "$PROV_OUT" | awk -F= '/^INSTANCE_ID=/{print $2}')
        if [ -z "$STACK_IP" ] || [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} provision did not produce STACK_IP/INSTANCE_ID"
          exit 1
        fi
        echo -e "{{.SUCCESS}} stack up at $STACK_IP (instance $INSTANCE_ID)"

        cleanup() {
          echo -e "{{.INFO}} tearing down $INSTANCE_ID..."
          task benchmark:replay:teardown INSTANCE_ID="$INSTANCE_ID" || \
            echo -e "{{.WARN}} teardown failed for $INSTANCE_ID — sweep for ares:component=benchmark-replay"
        }
        trap cleanup EXIT

        task benchmark:replay:run \
          STACK_IP="$STACK_IP" \
          OP_ID="{{.OP_ID}}" \
          REPLAY_MODE="{{.REPLAY_MODE}}" \
          TRIGGER_MODE="{{.TRIGGER_MODE}}" \
          OUTPUT_DIR="{{.OUTPUT_DIR}}" \
          MAX_STEPS="{{.MAX_STEPS}}" \
          CLOCK="{{.CLOCK}}" \
          SNAPSHOT_DIR="{{.SNAPSHOT_DIR}}" \
          MODEL="{{.MODEL}}" \
          QUIET_PERIOD="{{.QUIET_PERIOD}}"

  replay:run:
    desc: Run one benchmark investigation against an already-provisioned stack (no teardown).
    requires:
      vars: [STACK_IP, OP_ID]
    vars:
      SNAPSHOT_DIR: '{{.SNAPSHOT_DIR | default ""}}'
      MODEL: '{{.MODEL | default ""}}'
      MAX_STEPS: '{{.MAX_STEPS | default "50"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
      QUIET_PERIOD: '{{.QUIET_PERIOD | default ""}}'
      CLOCK: '{{.CLOCK | default "step"}}'
      REPLAY_MODE: '{{.REPLAY_MODE | default "timeline"}}'
      TRIGGER_MODE: '{{.TRIGGER_MODE | default "alert-replay"}}'
    cmds:
      - |
        echo -e "{{.INFO}} running investigation against {{.STACK_IP}} for {{.OP_ID}}..."
        {{.ARES_CLI}} benchmark run "{{.OP_ID}}" \
          --stack-ip "{{.STACK_IP}}" \
          --replay-mode "{{.REPLAY_MODE}}" \
          --trigger-mode "{{.TRIGGER_MODE}}" \
          --output-dir "{{.OUTPUT_DIR}}" \
          --max-steps "{{.MAX_STEPS}}" \
          --clock "{{.CLOCK}}" \
          {{if .SNAPSHOT_DIR}}--snapshot-dir "{{.SNAPSHOT_DIR}}"{{end}} \
          {{if .MODEL}}--model "{{.MODEL}}"{{end}} \
          {{if .QUIET_PERIOD}}--quiet-period "{{.QUIET_PERIOD}}"{{end}}

  replay:loop:
    desc: Provision once, run N investigations reusing the stack, tear down. For tuning loops (Vibe Gepa) and K-of-N averaging.
    requires:
      vars: [OP_ID]
    vars:
      ITERATIONS: '{{.ITERATIONS | default "1"}}'
      HOOK: '{{.HOOK | default ""}}'
      SNAPSHOT_DIR: '{{.SNAPSHOT_DIR | default ""}}'
      MODEL: '{{.MODEL | default ""}}'
      MAX_STEPS: '{{.MAX_STEPS | default "50"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
      QUIET_PERIOD: '{{.QUIET_PERIOD | default ""}}'
      CLOCK: '{{.CLOCK | default "step"}}'
      REPLAY_MODE: '{{.REPLAY_MODE | default "timeline"}}'
      TRIGGER_MODE: '{{.TRIGGER_MODE | default "alert-replay"}}'
    cmds:
      - |
        echo -e "{{.INFO}} provisioning replay stack for {{.OP_ID}} (loop x{{.ITERATIONS}})..."
        PROV_OUT=$(task benchmark:replay:provision OP_ID={{.OP_ID}})
        STACK_IP=$(echo "$PROV_OUT" | awk -F= '/^STACK_IP=/{print $2}')
        INSTANCE_ID=$(echo "$PROV_OUT" | awk -F= '/^INSTANCE_ID=/{print $2}')
        if [ -z "$STACK_IP" ] || [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} provision did not produce STACK_IP/INSTANCE_ID"
          exit 1
        fi
        echo -e "{{.SUCCESS}} stack up at $STACK_IP (instance $INSTANCE_ID)"

        cleanup() {
          echo -e "{{.INFO}} tearing down $INSTANCE_ID..."
          task benchmark:replay:teardown INSTANCE_ID="$INSTANCE_ID" || \
            echo -e "{{.WARN}} teardown failed for $INSTANCE_ID — sweep for ares:component=benchmark-replay"
        }
        trap cleanup EXIT

        FAILURES=0
        for i in $(seq 1 {{.ITERATIONS}}); do
          echo -e "{{.INFO}} iteration $i/{{.ITERATIONS}} against $STACK_IP..."
          if ! task benchmark:replay:run \
              STACK_IP="$STACK_IP" \
              OP_ID="{{.OP_ID}}" \
              REPLAY_MODE="{{.REPLAY_MODE}}" \
              TRIGGER_MODE="{{.TRIGGER_MODE}}" \
              OUTPUT_DIR="{{.OUTPUT_DIR}}" \
              MAX_STEPS="{{.MAX_STEPS}}" \
              CLOCK="{{.CLOCK}}" \
              SNAPSHOT_DIR="{{.SNAPSHOT_DIR}}" \
              MODEL="{{.MODEL}}" \
              QUIET_PERIOD="{{.QUIET_PERIOD}}"; then
            FAILURES=$((FAILURES + 1))
            echo -e "{{.WARN}} iteration $i failed — continuing loop"
          fi
          if [ -n "{{.HOOK}}" ] && [ "$i" -lt "{{.ITERATIONS}}" ]; then
            echo -e "{{.INFO}} running HOOK between iteration $i and $((i + 1))..."
            STACK_IP="$STACK_IP" OP_ID="{{.OP_ID}}" ITERATION="$i" bash -c '{{.HOOK}}' || {
              echo -e "{{.ERROR}} HOOK failed after iteration $i — aborting loop"
              exit 1
            }
          fi
        done

        if [ "$FAILURES" -gt 0 ]; then
          echo -e "{{.WARN}} {{.ITERATIONS}} iteration(s) complete — $FAILURES failed"
        else
          echo -e "{{.SUCCESS}} {{.ITERATIONS}} iteration(s) complete for {{.OP_ID}}"
        fi

  replay:provision:
    desc: Launch and set up a replay stack EC2 — prints STACK_IP=<ip> INSTANCE_ID=<id>.
    requires:
      vars: [OP_ID]
    preconditions:
      - sh: '[ -n "{{.SECURITY_GROUP_ID}}" ]'
        msg: "BENCHMARK_SECURITY_GROUP_ID is required (see .env.example)"
      - sh: '[ -n "{{.INSTANCE_PROFILE}}" ]'
        msg: "BENCHMARK_INSTANCE_PROFILE is required (see .env.example)"
      - sh: '[ -n "{{.SUBNET_ID}}" ]'
        msg: "BENCHMARK_SUBNET_ID is required (see .env.example)"
    cmds:
      - |
        export AWS_PROFILE={{.AWS_PROFILE}}
        export AWS_REGION={{.AWS_REGION}}

        # Resolve the AMI: prefer a pre-baked ares-replay-stack AMI (built via
        # `warpgate build ares-replay-stack`), fall back to stock AL2023 unless
        # BENCHMARK_REQUIRE_BAKED_AMI=1.
        if [ -n "${BENCHMARK_AMI_ID:-}" ]; then
          AMI_ID="$BENCHMARK_AMI_ID"
          echo -e "{{.INFO}} using BENCHMARK_AMI_ID override: $AMI_ID" >&2
        else
          AMI_ID=$(aws ec2 describe-images \
            --owners self \
            --filters "Name=tag:ares:component,Values=benchmark-replay-stack" "Name=state,Values=available" \
            --query 'sort_by(Images, &CreationDate)[-1].ImageId' \
            --output text 2>/dev/null || echo "None")
          if [ "$AMI_ID" = "None" ] || [ -z "$AMI_ID" ]; then
            if [ "{{.REQUIRE_BAKED_AMI}}" = "1" ]; then
              echo -e "{{.ERROR}} no pre-baked ares-replay-stack AMI found and BENCHMARK_REQUIRE_BAKED_AMI=1" >&2
              echo -e "{{.ERROR}} run: warpgate build ares-replay-stack --only 'ami.*'" >&2
              exit 1
            fi
            echo -e "{{.WARN}} no pre-baked AMI — falling back to stock AL2023 (~10 min slower)" >&2
            AMI_ID=$(aws ssm get-parameter \
              --name /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64 \
              --query Parameter.Value --output text)
          else
            echo -e "{{.INFO}} using pre-baked replay-stack AMI: $AMI_ID" >&2
          fi
        fi

        # Root volume must be >= the AMI's baked snapshot size. The bake grew it
        # to 40 GB (Docker + the 6 images), so a hardcoded 20 is rejected with
        # InvalidBlockDeviceMapping. Derive the size from the AMI so it never
        # drifts across re-bakes; floor at 40 for the stock-AL2023 fallback path.
        AMI_ROOT_GB=$(aws ec2 describe-images --image-ids "$AMI_ID" \
          --query 'Images[0].BlockDeviceMappings[0].Ebs.VolumeSize' --output text 2>/dev/null || echo 40)
        ROOT_GB=$AMI_ROOT_GB
        if [ -z "$ROOT_GB" ] || [ "$ROOT_GB" = "None" ] || { [ "$ROOT_GB" -lt 40 ] 2>/dev/null; }; then ROOT_GB=40; fi

        # Launch. gp3 root sized to the AMI (>=40 GB) fits Docker + the 6 images + snapshot data.
        INSTANCE_ID=$(aws ec2 run-instances \
          --image-id "$AMI_ID" \
          --instance-type "{{.INSTANCE_TYPE}}" \
          --subnet-id "{{.SUBNET_ID}}" \
          --security-group-ids "{{.SECURITY_GROUP_ID}}" \
          --iam-instance-profile "Name={{.INSTANCE_PROFILE}}" \
          --block-device-mappings "DeviceName=/dev/xvda,Ebs={VolumeSize=${ROOT_GB},VolumeType=gp3}" \
          --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=ares-replay-{{.OP_ID}}},{Key=ares:component,Value=benchmark-replay},{Key=ares:operation,Value={{.OP_ID}}}]" \
          --count 1 \
          --query 'Instances[0].InstanceId' --output text)
        echo -e "{{.INFO}} launched $INSTANCE_ID; waiting for status-ok..." >&2
        aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID"

        STACK_IP=$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
          --query 'Reservations[0].Instances[0].PrivateIpAddress' --output text)

        # Setup script: sync the snapshot data + run the baked-in /opt/replay-stack/setup.sh.
        # If we fell back to stock AL2023, /opt/replay-stack won't exist — install Docker,
        # pull from S3 as a fallback.
        SETUP_SCRIPT=$(cat <<EOF
        #!/bin/bash
        set -euo pipefail
        mkdir -p /opt/snap
        if [ ! -d /opt/replay-stack ]; then
          echo "[stack] /opt/replay-stack missing — falling back to stock provisioning"
          (dnf install -y docker jq python3 tar >/dev/null 2>&1) || (yum install -y docker jq python3 tar >/dev/null 2>&1)
          systemctl enable --now docker
          if ! docker compose version >/dev/null 2>&1; then
            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -sL https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-linux-x86_64 \\
              -o /usr/local/lib/docker/cli-plugins/docker-compose
            chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          fi
          aws s3 cp s3://{{.S3_BUCKET}}/benchmark-stack/replay-stack.tar.gz /tmp/replay-stack.tar.gz --region {{.AWS_REGION}} --quiet
          mkdir -p /opt/replay-stack
          tar -xzf /tmp/replay-stack.tar.gz -C /opt/replay-stack
        else
          systemctl enable --now docker
        fi
        aws s3 sync s3://{{.S3_BUCKET}}/snapshots/{{.OP_ID}}/ /opt/snap/ --region {{.AWS_REGION}} --quiet
        SNAPSHOT_DIR=/opt/snap GRAFANA_URL=http://localhost:3000 bash /opt/replay-stack/setup.sh
        EOF
        )

        B64_SCRIPT=$(printf '%s' "$SETUP_SCRIPT" | base64 | tr -d '\n')
        CMD_ID=$(aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name AWS-RunShellScript \
          --parameters "commands=[\"echo $B64_SCRIPT | base64 -d | bash\"]" \
          --timeout-seconds 1800 \
          --query Command.CommandId --output text)

        echo -e "{{.INFO}} SSM setup command $CMD_ID — waiting..." >&2
        DEADLINE=$(( $(date +%s) + 1800 ))
        while [ "$(date +%s)" -lt "$DEADLINE" ]; do
          sleep 10
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
          case "$STATUS" in
            Success) break ;;
            Failed|Cancelled|TimedOut)
              echo -e "{{.ERROR}} SSM setup $STATUS" >&2
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text >&2 || true
              task benchmark:replay:teardown INSTANCE_ID="$INSTANCE_ID" || \
                aws ec2 create-tags --resources "$INSTANCE_ID" --tags Key=ares:orphan,Value=true Key=ares:orphan-reason,Value=ssm-setup-failed || true
              exit 1
              ;;
          esac
        done
        if [ "$STATUS" != "Success" ]; then
          echo -e "{{.ERROR}} SSM setup timed out" >&2
          task benchmark:replay:teardown INSTANCE_ID="$INSTANCE_ID" || true
          exit 1
        fi

        # Verify stack readiness. Set BENCHMARK_SKIP_STACK_VERIFY=1 to skip
        # (useful when the caller — e.g. a laptop — can't reach the private stack).
        if [ "${BENCHMARK_SKIP_STACK_VERIFY:-0}" != "1" ]; then
          echo -e "{{.INFO}} verifying Grafana/Loki/Prometheus on $STACK_IP..." >&2
          for URL in "http://$STACK_IP:3000/api/health" "http://$STACK_IP:3100/ready" "http://$STACK_IP:9090/-/ready"; do
            READY=0
            for _ in $(seq 1 30); do
              if curl -sf --max-time 5 "$URL" >/dev/null 2>&1; then READY=1; break; fi
              sleep 2
            done
            if [ "$READY" != "1" ]; then
              echo -e "{{.ERROR}} $URL not ready after 60s" >&2
              task benchmark:replay:teardown INSTANCE_ID="$INSTANCE_ID" || true
              exit 1
            fi
          done
        fi

        echo -e "{{.SUCCESS}} replay stack ready" >&2
        echo "STACK_IP=$STACK_IP"
        echo "INSTANCE_ID=$INSTANCE_ID"

  replay:teardown:
    desc: Terminate a provisioned replay stack EC2.
    requires:
      vars: [INSTANCE_ID]
    cmds:
      - |
        export AWS_PROFILE={{.AWS_PROFILE}}
        export AWS_REGION={{.AWS_REGION}}
        echo -e "{{.INFO}} terminating {{.INSTANCE_ID}}..."
        aws ec2 terminate-instances --instance-ids "{{.INSTANCE_ID}}" --output text >/dev/null

  replay:ami:current:
    desc: Show which replay-stack AMI resolve would pick (for debugging bakes).
    cmds:
      - |
        export AWS_PROFILE={{.AWS_PROFILE}}
        export AWS_REGION={{.AWS_REGION}}
        aws ec2 describe-images \
          --owners self \
          --filters "Name=tag:ares:component,Values=benchmark-replay-stack" "Name=state,Values=available" \
          --query 'sort_by(Images, &CreationDate)[-1].[ImageId,Name,CreationDate]' \
          --output table
