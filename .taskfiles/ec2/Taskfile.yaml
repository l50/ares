---
# EC2 deployment tasks — run ares directly on EC2 via AWS SSM
# Alternative to K8s for faster testing iterations.
#
# Architecture: single EC2 with Redis + NATS + orchestrator + worker fleet.
# The orchestrator leaves ARES_TOOL_DISPATCH unset and routes every tool call
# over NATS to per-role ares@<role>.service workers, so heavy tools (hashcat,
# netexec) run inside the worker's own cgroup rather than the orchestrator's.
# The fleet (recon, credential_access, cracker, acl, privesc, lateral,
# coercion) and its infra are baked into the attack-box AMI by the Ansible
# collection in ansible/ (goad_attack_box.yml). If the workers are down,
# dispatches return "no responders" and the operation wedges at zero progress;
# ec2:setup verifies they are up.
#
# Usage:
#   task ec2:setup EC2_NAME=ares-tools       # Readiness check: guard impacket drift, ensure fleet up, smoke test
#   task ec2:deploy EC2_NAME=ares-tools      # Build + push Rust binaries via S3 + SSM
#   task ec2:start EC2_NAME=ares-tools       # Start Redis + NATS (infra only)
#   task ec2:status EC2_NAME=ares-tools      # Show process status
#   task ec2:redis:forward EC2_NAME=ares-tools  # Port-forward Redis for local CLI
#   task ec2:logs EC2_NAME=ares-tools ROLE=orchestrator  # Tail orchestrator logs
version: "3"

set: [errexit, pipefail]

vars:
  # Local ares CLI (matches the README build output + the red/blue includes).
  # Passed in from the root Taskfile; defaults so this taskfile works standalone.
  ARES_CLI: '{{.ARES_CLI | default "./target/release/ares"}}'
  INFO: '\033[0;34m[INFO]\033[0m'
  SUCCESS: '\033[0;32m[SUCCESS]\033[0m'
  ERROR: '\033[0;31m[ERROR]\033[0m'
  WARN: '\033[1;33m[WARN]\033[0m'
  # EC2 instance identification (Name tag filter)
  EC2_NAME: '{{.EC2_NAME | default "kali-ares"}}'
  # Honor standard AWS env vars (AWS_PROFILE / AWS_REGION / AWS_DEFAULT_REGION).
  # Override per-invocation with AWS_PROFILE=foo task ec2:foo or by passing
  # AWS_PROFILE=foo AWS_REGION=us-east-1 explicitly on the task command line.
  AWS_PROFILE: '{{.AWS_PROFILE | default (env "AWS_PROFILE") | default "lab"}}'
  AWS_REGION: '{{.AWS_REGION | default (env "AWS_REGION") | default (env "AWS_DEFAULT_REGION") | default "us-west-1"}}'
  # If temporary env credentials are present (e.g. from `assume`, `aws-vault`,
  # instance metadata), skip --profile so the AWS CLI uses them. Otherwise pass
  # --profile <name> and rely on ~/.aws/config. Resolved lazily per task run.
  AWS_PROFILE_ARG:
    sh: |
      if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
        printf ''
      else
        printf '%s' '--profile {{.AWS_PROFILE}}'
      fi
  # Shell snippet the tasks eval before sourcing run-ssm.sh: if env creds are
  # already present, unset AWS_PROFILE so boto3/aws-sdk don't try to refresh
  # a (possibly expired) SSO token instead of using the env session; otherwise
  # export AWS_PROFILE=<name> for the profile-based path.
  AWS_PROFILE_EXPORT:
    sh: |
      if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
        printf 'unset AWS_PROFILE'
      else
        printf 'export AWS_PROFILE=%s' '{{.AWS_PROFILE}}'
      fi
  # S3 bucket for file staging (required; pass S3_BUCKET=your-bucket or set as env var)
  S3_BUCKET: '{{.S3_BUCKET | default (env "S3_BUCKET") | default ""}}'
  # Remote paths on EC2
  ARES_REMOTE_BIN: '/usr/local/bin'
  ARES_REMOTE_CONFIG: '/etc/ares/config.yaml'
  ARES_LOG_DIR: '/var/log/ares'
  # Build tool: remote (native build on EC2, default), auto (cross on macOS due
  # to aws-lc-sys, zigbuild on Linux), cross, zigbuild, cargo.
  # `remote` is the default because arm64 Mac hosts crash rustc under qemu-user
  # emulation during the local cross build. If the EC2 linker OOMs on remote,
  # bump instance RAM/swap or set BUILD_TOOL=auto.
  BUILD_TOOL: '{{.BUILD_TOOL | default (env "BUILD_TOOL") | default "remote"}}'
  # Build profile: release (optimized) or dev-deploy (fast compile, less optimized)
  BUILD_PROFILE: '{{.BUILD_PROFILE | default "dev-deploy"}}'
  REMOTE_BUILD_DIR: '/tmp/ares-build'
  # Loki deployment label for blue team queries
  EC2_DEPLOYMENT: '{{.EC2_DEPLOYMENT | default "alpha-operator-range"}}'

tasks:
  # ============================================================================
  # Instance Resolution
  # ============================================================================
  resolve:
    desc: "Show resolved EC2 instance ID and IP (usage: task ec2:resolve [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        INSTANCE_INFO=$(aws ec2 describe-instances \
          {{.AWS_PROFILE_ARG}} \
          --region "{{.AWS_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].[InstanceId,PrivateIpAddress,Tags[?Key==\`Name\`].Value|[0]]" \
          --output text)

        if [ -z "$INSTANCE_INFO" ]; then
          echo -e "{{.ERROR}} No running instance found matching Name tag: {{.EC2_NAME}}"
          exit 1
        fi

        echo -e "{{.SUCCESS}} Resolved EC2 instance:"
        echo "$INSTANCE_INFO" | while read -r id ip name; do
          echo "  Instance ID: $id"
          echo "  Private IP:  $ip"
          echo "  Name:        $name"
        done

  # ============================================================================
  # Binary Deployment
  # ============================================================================
  deploy:
    desc: "Cross-compile Rust binaries and deploy to EC2 via S3 staging (usage: task ec2:deploy [EC2_NAME=ares-tools] [SKIP_RESTART=true])"
    silent: true
    vars:
      RUST_TARGET: '{{.RUST_TARGET | default "x86_64-unknown-linux-gnu"}}'
      MAX_OPEN_FILES: '{{.MAX_OPEN_FILES | default "65536"}}'
      CARGO_BUILD_JOBS: '{{.CARGO_BUILD_JOBS | default "0"}}'
      S3_DEPLOY_PREFIX: 'ares-deploy'
      # After the binary lands, bounce ares@<role>.service units so the new
      # code is what services NATS. Set SKIP_RESTART=true to opt out (e.g.,
      # long-running op in flight, hotfix you don't want to interrupt) —
      # the deploy will print a loud warning telling you to run ec2:restart
      # manually when the op finishes. This is on by default because the
      # tool-pruning cache poison persists across the worker's lifetime,
      # so a deploy that lands new classifier logic without a restart lands
      # nothing (see the ares-debug skill, Step 3.5).
      SKIP_RESTART: '{{.SKIP_RESTART | default "false"}}'
    preconditions:
      - sh: aws sts get-caller-identity {{.AWS_PROFILE_ARG}} --region "{{.AWS_REGION}}" >/dev/null 2>&1
        msg: "Not logged into AWS. Either export env creds (e.g. `assume {{.AWS_PROFILE}}`) or run `aws sso login --profile {{.AWS_PROFILE}}`."
      - sh: test -n "{{.S3_BUCKET}}"
        msg: "S3_BUCKET not set. Pass S3_BUCKET=your-bucket or export it as an env var."
    cmds:
      # Build binaries (local cross-compile or remote native build)
      - |
        # cross/cargo-zigbuild/sccache live in ~/.cargo/bin; fresh non-login
        # shells (and Task's own env) don't always inherit it, so `command -v`
        # misses them and auto-detect falls back to plain cargo.
        export PATH="$HOME/.cargo/bin:$PATH"

        BUILD_TOOL="{{.BUILD_TOOL}}"

        # Resolve 'auto': cross is required on macOS because aws-lc-sys
        # (pulled by rustls/reqwest) fails under zigbuild's Zig AR wrapper.
        # On Linux, prefer zigbuild (no Docker overhead).
        if [ "$BUILD_TOOL" = "auto" ]; then
          if [ "$(uname)" = "Darwin" ] && command -v cross >/dev/null 2>&1; then
            BUILD_TOOL="cross"
          elif command -v cargo-zigbuild >/dev/null 2>&1; then
            BUILD_TOOL="zigbuild"
          elif command -v cross >/dev/null 2>&1; then
            BUILD_TOOL="cross"
          else
            BUILD_TOOL="cargo"
          fi
        fi

        echo -e "{{.INFO}} Using build tool: $BUILD_TOOL"

        # --- remote: build natively on EC2 (no cross-compilation) ---
        if [ "$BUILD_TOOL" = "remote" ]; then
          echo -e "{{.INFO}} Building natively on EC2..."

          {{.AWS_PROFILE_EXPORT}}
          export AWS_REGION="{{.AWS_REGION}}"
          . .taskfiles/ec2/scripts/run-ssm.sh

          INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

          # Create source tarball (exclude build artifacts and git metadata).
          # .cargo/ holds an OPTIONAL gitignored per-dev config.toml; include
          # only if present so fresh clones (without one) don't fail the tar.
          # Always include the tracked Cross.toml + ares-core migrations/.
          # COPYFILE_DISABLE prevents BSD tar from emitting macOS AppleDouble
          # `._*` metadata files; the matching --exclude is belt+suspenders for
          # any `._*` already on disk from prior Finder access — sqlx::migrate!
          # rejects them as malformed migration names.
          # BSD mktemp (macOS) only substitutes XXXXXX when it's the trailing
          # chars of the template; `mktemp /tmp/foo-XXXXXX.tar.gz` created a
          # LITERAL /tmp/foo-XXXXXX.tar.gz once and then failed every subsequent
          # run with "mkstemp failed: File exists". Create the base, then rename
          # with the suffix so we keep mktemp's atomic collision-free property.
          SRC_TAR=$(mktemp /tmp/ares-src-XXXXXX)
          mv "$SRC_TAR" "${SRC_TAR}.tar.gz"
          SRC_TAR="${SRC_TAR}.tar.gz"
          trap "rm -f $SRC_TAR" EXIT
          SRC_PATHS="Cargo.toml Cargo.lock Cross.toml tools.yaml ares-core/ ares-cli/ ares-llm/ ares-tools/ benchmarks/"
          [ -d .cargo ] && SRC_PATHS="$SRC_PATHS .cargo/"
          COPYFILE_DISABLE=1 tar -czf "$SRC_TAR" \
            --exclude='target' --exclude='.git' --exclude='*.o' --exclude='*.d' --exclude='._*' \
            -C "$(pwd)" $SRC_PATHS

          # Upload source to S3
          echo -e "{{.INFO}} Uploading source to S3..."
          aws s3 cp "$SRC_TAR" "s3://{{.S3_BUCKET}}/{{.S3_DEPLOY_PREFIX}}/ares-src.tar.gz" \
            {{.AWS_PROFILE_ARG}} --region "{{.AWS_REGION}}"

          # Build on EC2 via SSM
          echo -e "{{.INFO}} Building on $INSTANCE_ID (this may take a few minutes on first run)..."

          PAYLOAD=$(jq -rn \
            --arg bucket "{{.S3_BUCKET}}" \
            --arg prefix "{{.S3_DEPLOY_PREFIX}}" \
            --arg build_dir "{{.REMOTE_BUILD_DIR}}" \
            '[
              "set -ex",
              "mkdir -p " + $build_dir,
              "aws s3 cp s3://" + $bucket + "/" + $prefix + "/ares-src.tar.gz /tmp/ares-src.tar.gz",
              "tar -xzf /tmp/ares-src.tar.gz -C " + $build_dir,
              "find " + $build_dir + " -name \"._*\" -delete 2>/dev/null || true",
              "cd " + $build_dir + " && cargo build --profile dev-deploy -p ares-cli 2>&1",
              "SRC=" + $build_dir + "/target/dev-deploy/ares",
              "if [ ! -f \"$SRC\" ]; then echo ERROR: build artifact missing at $SRC; exit 1; fi",
              "BUILD_RAW=$(sha256sum \"$SRC\"); BUILD_SHA=${BUILD_RAW%% *}",
              "echo Build SHA: $BUILD_SHA",
              "install -m 755 \"$SRC\" /usr/local/bin/ares",
              "DEPLOY_RAW=$(sha256sum /usr/local/bin/ares); DEPLOY_SHA=${DEPLOY_RAW%% *}",
              "echo Deploy SHA: $DEPLOY_SHA",
              "if [ \"$BUILD_SHA\" != \"$DEPLOY_SHA\" ]; then echo ERROR: deployed sha differs from build artifact build=$BUILD_SHA deploy=$DEPLOY_SHA; exit 1; fi",
              "echo Deployed: && ls -lh /usr/local/bin/ares"
            ] | join("\n")')

          # Clean cargo builds on a t3.medium can run 15-25 min — pre-EC2-reboot
          # cache may be wiped, and incremental builds still need to relink.
          # Allow 30 min total for both the SSM command itself and the local
          # polling loop so we don't bail mid-build with a "InProgress" report.
          OUTPUT=$(run_ssm_cmd "$INSTANCE_ID" "$PAYLOAD" 1800) || exit 1
          echo "$OUTPUT" | tail -20

          # Restart every ares@<role> worker unit so the freshly-installed
          # binary is actually the code servicing NATS. Without this the
          # remote-build path silently ships a new /usr/local/bin/ares while
          # systemd keeps the pre-deploy process alive and executing the old
          # binary against the same NATS subscription — the exact
          # "workers stuck on 34h-old in-memory ares" wedge that hid the
          # tool-pruning cache poison across deploys. Uses a glob so
          # newly-added roles come along for free; each unit's
          # Restart=on-failure handles the transient window.
          #
          # Set SKIP_RESTART=true to opt out (e.g., an op is mid-flight and
          # you're pushing a hotfix you don't want to interrupt). Prints a
          # loud warning so it can't be forgotten.
          if [ "{{.SKIP_RESTART}}" = "true" ]; then
            echo -e "{{.WARN}} SKIP_RESTART=true — workers NOT restarted."
            echo -e "{{.WARN}} The old in-memory ares binary is still servicing NATS."
            echo -e "{{.WARN}} Run 'task ec2:restart EC2_NAME={{.EC2_NAME}}' when the current op finishes."
          else
            RESTART_CMD='set -e; UNITS=$(systemctl list-units --type=service --state=active --no-legend "ares@*.service" 2>/dev/null | awk "{print \$1}" | sort -u); '
            RESTART_CMD+='if [ -z "$UNITS" ]; then echo "no ares@ worker units active — skipping restart"; else echo "restarting: $UNITS"; systemctl restart $UNITS; sleep 2; systemctl is-active $UNITS | sort -u; fi'
            echo -e "{{.INFO}} Restarting ares@ worker units so they load the new binary..."
            run_ssm_cmd "$INSTANCE_ID" "$RESTART_CMD" 60 || exit 1
          fi

          echo -e "{{.SUCCESS}} Remote build + deploy complete"
          exit 0
        fi

        # --- local cross-compilation path ---
        PROFILE="{{.BUILD_PROFILE}}"
        if [ "$PROFILE" = "release" ]; then
          PROFILE_FLAG="--release"
          BIN_SUBDIR="release"
        else
          PROFILE_FLAG="--profile $PROFILE"
          BIN_SUBDIR="$PROFILE"
        fi

        echo -e "{{.INFO}} Cross-compiling for {{.RUST_TARGET}} (profile: $PROFILE, jobs: {{.CARGO_BUILD_JOBS}})..."
        echo -e "{{.INFO}} FD limit inherited from parent: $(sh -c 'ulimit -n' 2>/dev/null || echo unknown)"

        # Zig 0.15+ rejects RLIM_INFINITY on the *hard* fd limit (returns
        # ProcessFdQuotaExceeded mid-link). On macOS, default zsh/bash sessions
        # have soft=1048576 but hard=RLIM_INFINITY (`getrlimit` returns INT64_MAX),
        # so even a high soft limit isn't enough — Zig sees the unlimited hard
        # limit and bails. `ulimit -n N` sets both soft and hard to N, which is
        # exactly what we want. Always pin to a concrete value, regardless of
        # the current setting.
        ulimit -n {{.MAX_OPEN_FILES}} 2>/dev/null || ulimit -n 10240 2>/dev/null || ulimit -n 4096 2>/dev/null || true

        JOBS="{{.CARGO_BUILD_JOBS}}"
        if [ "$JOBS" = "0" ]; then
          # 0 = use all available cores (cargo default)
          JOBS_FLAG=""
        else
          JOBS_FLAG="-j $JOBS"
        fi

        # Use sccache for dependency caching, but ONLY when it's actually
        # installed on the host. The cross path passes RUSTC_WRAPPER through to
        # the container (where Cross.toml also installs sccache) and bind-mounts
        # SCCACHE_DIR — but exporting the wrapper without a host sccache breaks
        # cross's host-side `rustc` version probe ("couldn't fetch the rustc
        # version"). sccache stays a genuine optional accelerator: the build
        # works with or without it.
        #
        # Skip on arm64-host + cross: sccache's `rustc -vV` probe runs inside
        # the emulated x86_64 container and rustc SIGSEGVs under qemu. Set
        # ARES_FORCE_SCCACHE=1 to override.
        SKIP_SCCACHE=""
        if [ "$BUILD_TOOL" = "cross" ] && [ "$(uname -m)" = "arm64" ] && [ -z "${ARES_FORCE_SCCACHE:-}" ]; then
          SKIP_SCCACHE=1
          echo -e "{{.INFO}} Skipping sccache (arm64→x86_64 cross under qemu segfaults rustc probe; set ARES_FORCE_SCCACHE=1 to override)"
        fi
        if [ -z "$SKIP_SCCACHE" ] && command -v sccache >/dev/null 2>&1; then
          export RUSTC_WRAPPER=sccache
          export SCCACHE_DIR="${SCCACHE_DIR:-$HOME/.cache/sccache}"
          mkdir -p "$SCCACHE_DIR"
          echo -e "{{.INFO}} Using sccache (cache: $SCCACHE_DIR)"
        fi

        # cross-rs images publish amd64 only; on an Apple Silicon (arm64) host
        # Docker finds no native manifest ("no match for platform in manifest")
        # and the pre-build fails. Pin the platform so it builds the amd64 image
        # under emulation. No-op on amd64 hosts and for non-cross build tools.
        if [ "$BUILD_TOOL" = "cross" ] && [ "$(uname -m)" = "arm64" ]; then
          export DOCKER_DEFAULT_PLATFORM=linux/amd64
          echo -e "{{.INFO}} arm64 host — building amd64 cross image under emulation (DOCKER_DEFAULT_PLATFORM=linux/amd64)"
          # qemu-user segfaults rustc's default 8 MiB stack on `rustc -vV` and
          # other short-lived invocations. Bump per rustc's own suggestion.
          # Cross.toml passes this through to the container.
          export RUST_MIN_STACK="${RUST_MIN_STACK:-16777216}"
        fi

        case "$BUILD_TOOL" in
          cross)
            # Override linker: container has x86_64-linux-gnu-gcc, not x86_64-unknown-linux-gnu-gcc.
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=x86_64-linux-gnu-gcc
            # Use CMake builder for aws-lc-sys (CC builder fails due to GCC memcmp bug #95189)
            export AWS_LC_SYS_CMAKE_BUILDER=1
            cross build $PROFILE_FLAG --target {{.RUST_TARGET}} $JOBS_FLAG -p ares-cli
            ;;
          zigbuild)
            cargo zigbuild $PROFILE_FLAG --target {{.RUST_TARGET}} $JOBS_FLAG -p ares-cli
            ;;
          cargo)
            echo -e "{{.WARN}} Using plain cargo (no cross-compilation toolchain)..."
            cargo build $PROFILE_FLAG --target {{.RUST_TARGET}} $JOBS_FLAG -p ares-cli
            ;;
          *)
            echo -e "{{.ERROR}} Unknown BUILD_TOOL: $BUILD_TOOL (valid: auto, cross, zigbuild, cargo)"
            exit 1
            ;;
        esac

        echo -e "{{.SUCCESS}} Binary built:"
        ls -lh "target/{{.RUST_TARGET}}/$BIN_SUBDIR/ares" 2>/dev/null || true

      # Upload to S3 staging (skip for remote builds)
      - |
        if [ "{{.BUILD_TOOL}}" = "remote" ]; then exit 0; fi

        PROFILE="{{.BUILD_PROFILE}}"
        if [ "$PROFILE" = "release" ]; then
          BIN_SUBDIR="release"
        else
          BIN_SUBDIR="$PROFILE"
        fi
        BIN_PATH="target/{{.RUST_TARGET}}/$BIN_SUBDIR/ares"

        # Strip debug symbols if profile doesn't handle it (release profile without strip)
        if [ "$PROFILE" = "release" ]; then
          echo -e "{{.INFO}} Stripping binary..."
          STRIP_BIN="x86_64-linux-gnu-strip"
          if ! command -v "$STRIP_BIN" >/dev/null 2>&1; then
            STRIP_BIN="strip"
          fi
          $STRIP_BIN "$BIN_PATH" 2>/dev/null || echo -e "{{.WARN}} Strip failed (non-fatal)"
        fi
        ls -lh "$BIN_PATH"

        # Pin sha256 of what we're about to ship so the SSM deploy step can
        # verify the binary that lands on /usr/local/bin/ares matches exactly.
        # Without this, the cp can silently fail to overwrite (ETXTBSY, immutable
        # attribute, symlink redirection, prior deploy race) and the task still
        # reports success.
        if command -v sha256sum >/dev/null 2>&1; then
          BUILD_SHA=$(sha256sum "$BIN_PATH" | awk '{print $1}')
        else
          BUILD_SHA=$(shasum -a 256 "$BIN_PATH" | awk '{print $1}')
        fi
        echo -e "{{.INFO}} Build SHA: $BUILD_SHA"
        mkdir -p target/.deploy
        echo "$BUILD_SHA" > target/.deploy/ares.sha256

        echo -e "{{.INFO}} Uploading binary to s3://{{.S3_BUCKET}}/{{.S3_DEPLOY_PREFIX}}/..."
        aws s3 cp "$BIN_PATH" "s3://{{.S3_BUCKET}}/{{.S3_DEPLOY_PREFIX}}/ares" \
          {{.AWS_PROFILE_ARG}} --region "{{.AWS_REGION}}"

        echo -e "{{.SUCCESS}} Binary staged in S3 (sha=$BUILD_SHA)"

      # Pull from S3 on EC2 via SSM + verify (skip for remote builds)
      - |
        if [ "{{.BUILD_TOOL}}" = "remote" ]; then exit 0; fi

        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        echo -e "{{.INFO}} Pulling binaries from S3 to $INSTANCE_ID..."

        EXPECTED_SHA=""
        if [ -f target/.deploy/ares.sha256 ]; then
          EXPECTED_SHA=$(cat target/.deploy/ares.sha256)
        fi

        PAYLOAD=$(jq -rn \
          --arg bucket "{{.S3_BUCKET}}" \
          --arg prefix "{{.S3_DEPLOY_PREFIX}}" \
          --arg expected_sha "$EXPECTED_SHA" \
          '[
            "set -ex",
            "aws s3 cp s3://" + $bucket + "/" + $prefix + "/ares /tmp/ares.staged",
            "STAGED_RAW=$(sha256sum /tmp/ares.staged); STAGED_SHA=${STAGED_RAW%% *}",
            "echo Staged SHA: $STAGED_SHA",
            "if [ -n \"" + $expected_sha + "\" ] && [ \"$STAGED_SHA\" != \"" + $expected_sha + "\" ]; then echo ERROR: S3 staged binary sha mismatch expected=" + $expected_sha + " staged=$STAGED_SHA; exit 1; fi",
            "install -m 755 /tmp/ares.staged /usr/local/bin/ares",
            "DEPLOY_RAW=$(sha256sum /usr/local/bin/ares); DEPLOY_SHA=${DEPLOY_RAW%% *}",
            "echo Deploy SHA: $DEPLOY_SHA",
            "if [ \"$STAGED_SHA\" != \"$DEPLOY_SHA\" ]; then echo ERROR: deployed sha differs from staged staged=$STAGED_SHA deploy=$DEPLOY_SHA; exit 1; fi",
            "rm -f /tmp/ares.staged",
            "echo Deployed: && ls -lh /usr/local/bin/ares"
          ] | join("\n")')

        run_ssm_cmd "$INSTANCE_ID" "$PAYLOAD" 240 || exit 1

        # Restart every ares@<role> worker unit so the freshly-installed
        # binary is actually the code servicing NATS. Without this the
        # deploy silently ships a new /usr/local/bin/ares while systemd
        # keeps the pre-deploy process alive and executing the old binary
        # against the same NATS subscription — the classic 14h-stale-worker
        # wedge (see PR discussion). Uses a glob so newly-added roles come
        # along for free; each unit's Restart=on-failure handles the
        # transient window.
        #
        # Set SKIP_RESTART=true to opt out (e.g., an op is mid-flight and
        # you're pushing a hotfix you don't want to interrupt). Prints a
        # loud warning so it can't be forgotten.
        if [ "{{.SKIP_RESTART}}" = "true" ]; then
          echo -e "{{.WARN}} SKIP_RESTART=true — workers NOT restarted."
          echo -e "{{.WARN}} The old in-memory ares binary is still servicing NATS."
          echo -e "{{.WARN}} Run 'task ec2:restart EC2_NAME={{.EC2_NAME}}' when the current op finishes."
        else
          RESTART_CMD='set -e; UNITS=$(systemctl list-units --type=service --state=active --no-legend "ares@*.service" 2>/dev/null | awk "{print \$1}" | sort -u); '
          RESTART_CMD+='if [ -z "$UNITS" ]; then echo "no ares@ worker units active — skipping restart"; else echo "restarting: $UNITS"; systemctl restart $UNITS; sleep 2; systemctl is-active $UNITS | sort -u; fi'
          echo -e "{{.INFO}} Restarting ares@ worker units so they load the new binary..."
          run_ssm_cmd "$INSTANCE_ID" "$RESTART_CMD" 60 || exit 1
        fi

        echo -e "{{.SUCCESS}} Deploy complete"

      # Also deploy config
      - task: deploy:config
        vars:
          EC2_NAME: '{{.EC2_NAME}}'

  deploy:config:
    desc: "Push config.yaml to EC2 via S3 staging (usage: task ec2:deploy:config [EC2_NAME=ares-tools] [ARES_CONFIG=./config/ares.yaml])"
    silent: true
    vars:
      ARES_CONFIG: '{{.ARES_CONFIG | default "./config/ares.yaml"}}'
      S3_DEPLOY_PREFIX: 'ares-deploy'
    preconditions:
      - sh: test -f "{{.ARES_CONFIG}}"
        msg: "Config file not found: {{.ARES_CONFIG}}"
      - sh: test -n "{{.S3_BUCKET}}"
        msg: "S3_BUCKET not set. Pass S3_BUCKET=your-bucket or export it as an env var."
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        echo -e "{{.INFO}} Uploading config to S3..."
        aws s3 cp "{{.ARES_CONFIG}}" "s3://{{.S3_BUCKET}}/{{.S3_DEPLOY_PREFIX}}/config.yaml" \
          {{.AWS_PROFILE_ARG}} --region "{{.AWS_REGION}}"

        echo -e "{{.INFO}} Pulling config to $INSTANCE_ID..."
        PAYLOAD="mkdir -p /etc/ares && aws s3 cp s3://{{.S3_BUCKET}}/{{.S3_DEPLOY_PREFIX}}/config.yaml /etc/ares/config.yaml && echo Config deployed: && cat /etc/ares/config.yaml | head -5"

        run_ssm_cmd "$INSTANCE_ID" "$PAYLOAD" 30 || exit 1

        echo -e "{{.SUCCESS}} Config deployed to $INSTANCE_ID:{{.ARES_REMOTE_CONFIG}}"

  # ============================================================================
  # One-Time Setup
  # ============================================================================
  setup:
    desc: "EC2 readiness check: guard impacket drift, ensure baked fleet is up, smoke-test Redis+NATS (provisioning is baked into the AMI; usage: task ec2:setup [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        echo -e "{{.INFO}} Setting up ares on $INSTANCE_ID..."
        echo -e "{{.INFO}} Waiting for setup to complete..."

        PAYLOAD=$(cat .taskfiles/ec2/scripts/setup.sh)
        echo ""
        run_ssm_cmd "$INSTANCE_ID" "$PAYLOAD" 120 || exit 1

        echo -e "{{.SUCCESS}} EC2 setup complete"

  # ============================================================================
  # Process Management
  # ============================================================================
  start:
    desc: "Start Redis + NATS on EC2 (infra only; orchestrator launched per-op via red:ec2:multi)"
    silent: true
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        echo -e "{{.INFO}} Starting infra services on $INSTANCE_ID..."

        START_CMD="systemctl start redis-server 2>/dev/null || systemctl start redis; sleep 1; redis-cli ping; "
        START_CMD+="systemctl start nats-server; sleep 1; curl -fsS http://127.0.0.1:8222/varz >/dev/null && echo 'NATS OK' || echo 'NATS NOT RUNNING'"

        run_ssm_cmd "$INSTANCE_ID" "$START_CMD" 30 || exit 1
        echo -e "{{.SUCCESS}} Infra services started"

  stop:
    desc: "Stop the running ares orchestrator on EC2 (keeps Redis/NATS running)"
    silent: true
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh
        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        echo -e "{{.INFO}} Stopping ares orchestrator on $INSTANCE_ID..."
        run_ssm_cmd "$INSTANCE_ID" \
          'systemctl stop ares-orchestrator.service 2>/dev/null || true; pkill -f "ares orchestrator" 2>/dev/null || true; echo Stopped orchestrator' \
          30
        echo -e "{{.SUCCESS}} Services stopped (Redis still running)"

  stop-op:
    desc: "Stop a specific operation gracefully (usage: task ec2:stop-op [EC2_NAME=ares-tools] [OPERATION_ID=op-xxx] [LATEST=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "false"}}'
    preconditions:
      - sh: '[ -n "{{.OPERATION_ID}}" ] || [ "{{.LATEST}}" = "true" ]'
        msg: "Provide OPERATION_ID=op-xxx or LATEST=true"
    cmd: >-
      {{.ARES_CLI}} --ec2 {{.EC2_NAME}} --ec2-profile {{.AWS_PROFILE}} --ec2-region {{.AWS_REGION}}
      ops stop
      {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
      {{if eq .LATEST "true"}}--latest{{end}}

  kill:
    desc: "Kill (stop + delete) running operations on EC2 (usage: task ec2:kill [EC2_NAME=kali-ares] [OPERATION_ID=op-xxx] [ALL=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      ALL: '{{.ALL | default "false"}}'
    cmd: >-
      {{.ARES_CLI}} --ec2 {{.EC2_NAME}} --ec2-profile {{.AWS_PROFILE}} --ec2-region {{.AWS_REGION}}
      ops kill
      {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
      {{if eq .ALL "true"}}--all{{end}}

  teardown:
    desc: "Reverse an operation's persistent target mutations via its journal (usage: task ec2:teardown [EC2_NAME=kali-ares] [OPERATION_ID=op-xxx] [LATEST=true] [DRY_RUN=true] [ONLY=rbcd_write])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "false"}}'
      DRY_RUN: '{{.DRY_RUN | default "false"}}'
      ONLY: '{{.ONLY | default ""}}'
    preconditions:
      - sh: '[ -n "{{.OPERATION_ID}}" ] || [ "{{.LATEST}}" = "true" ]'
        msg: "Provide OPERATION_ID=op-xxx or LATEST=true"
    cmd: >-
      {{.ARES_CLI}} --ec2 {{.EC2_NAME}} --ec2-profile {{.AWS_PROFILE}} --ec2-region {{.AWS_REGION}}
      ops teardown
      {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
      {{if eq .LATEST "true"}}--latest{{end}}
      {{if eq .DRY_RUN "true"}}--dry-run{{end}}
      {{if ne .ONLY ""}}--only {{.ONLY}}{{end}}

  restart:
    desc: "Restart the ares orchestrator + infra services on EC2"
    silent: true
    cmds:
      - task: stop
      - task: start

  # ============================================================================
  # Status & Monitoring
  # ============================================================================
  status:
    desc: "Show ares process status on EC2 (usage: task ec2:status [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh
        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        run_ssm_cmd "$INSTANCE_ID" "$(cat .taskfiles/ec2/scripts/status.sh)" 30

  hashcat:
    desc: "Show hashcat jobs currently running on EC2 (usage: task ec2:hashcat [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh
        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        run_ssm_cmd "$INSTANCE_ID" "$(cat .taskfiles/ec2/scripts/hashcat-status.sh)" 30

  logs:
    desc: "Tail ares logs on EC2 via SSM session (usage: task ec2:logs [EC2_NAME=ares-tools] [ROLE=orchestrator] [LINES=50])"
    silent: true
    vars:
      ROLE: '{{.ROLE | default "orchestrator"}}'
      LINES: '{{.LINES | default "50"}}'
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh
        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        LOG_FILE="{{.ARES_LOG_DIR}}/{{.ROLE}}.log"
        echo -e "{{.INFO}} Tailing $LOG_FILE on $INSTANCE_ID (Ctrl+C to stop)..."

        aws ssm start-session \
          {{.AWS_PROFILE_ARG}} \
          --region "{{.AWS_REGION}}" \
          --target "$INSTANCE_ID" \
          --document-name "AWS-StartInteractiveCommand" \
          --parameters "command=[\"tail -n {{.LINES}} -f $LOG_FILE\"]"

  logs:fetch:
    desc: "Fetch ares logs from EC2 to a local file for programmatic reading (usage: task ec2:logs:fetch [ROLE=orchestrator|recon|all] [LINES=2000] [OP_ID=op-YYYYMMDD-HHMMSS] [SINCE=2026-07-02T15:00])"
    silent: true
    vars:
      ROLE: '{{.ROLE | default "orchestrator"}}'
      LINES: '{{.LINES | default "2000"}}'
      OP_ID: '{{.OP_ID | default ""}}'
      SINCE: '{{.SINCE | default ""}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./logs"}}'
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        mkdir -p "{{.OUTPUT_DIR}}"
        TS=$(date +%Y%m%d-%H%M%S)
        TAG="{{.OP_ID}}"
        if [ -z "$TAG" ]; then TAG="latest"; fi

        # Filters run remotely (grep+awk cheap on the box; keeps SSM payload small).
        # When OP_ID or SINCE is set, over-fetch by 20x so the final `tail -n LINES`
        # still lands on real content instead of an empty slice.
        REMOTE_LINES={{.LINES}}
        if [ -n "{{.OP_ID}}" ] || [ -n "{{.SINCE}}" ]; then
          REMOTE_LINES=$(({{.LINES}} * 20))
        fi

        # Build the shared filter pipe applied to each log file.
        FILTER=""
        if [ -n "{{.OP_ID}}" ]; then
          FILTER="$FILTER | grep -F '{{.OP_ID}}'"
        fi
        if [ -n "{{.SINCE}}" ]; then
          # tracing_subscriber fmt timestamps are ISO-8601 in field 1 — lex-comparable.
          # Timestamped lines gate on SINCE; multi-line continuation lines (tool
          # output, stack traces) have no leading timestamp and pass through so
          # they stay attached to the log entry they belong to.
          FILTER="$FILTER | awk -v s='{{.SINCE}}' '\$1 ~ /^[0-9]{4}-[0-9]{2}-[0-9]{2}T/ { if (\$1 >= s) print; next } { print }'"
        fi
        FILTER="$FILTER | tail -n {{.LINES}}"

        OUT_FILE="{{.OUTPUT_DIR}}/ec2-{{.ROLE}}-$TAG-$TS.log"

        # Strip ANSI escape codes locally. systemd `StandardOutput=append:` usually
        # captures without a TTY (no color) but this is cheap belt-and-suspenders.
        strip_ansi() { LC_ALL=C sed $'s/\x1b\\[[0-9;]*[a-zA-Z]//g'; }

        # Pick role scope. `all` fans out one SSM call per role — remote
        # concatenation blows past SSM's StandardOutputContent cap (~24KB) and
        # silently truncates trailing files. Single-role hits its file directly.
        if [ "{{.ROLE}}" = "all" ]; then
          : > "$OUT_FILE"
          for role in orchestrator recon credential_access lateral_movement coercion acl cracker privesc; do
            LOG_PATH="{{.ARES_LOG_DIR}}/$role.log"
            REMOTE_CMD="tail -n $REMOTE_LINES $LOG_PATH 2>/dev/null $FILTER"
            echo "===FILE:$LOG_PATH===" >> "$OUT_FILE"
            run_ssm_cmd "$INSTANCE_ID" "$REMOTE_CMD" 60 \
              | strip_ansi \
              >> "$OUT_FILE" || true
            # run_ssm_cmd emits with no trailing newline; keep the next FILE
            # marker on its own line.
            printf '\n' >> "$OUT_FILE"
          done
        else
          LOG_PATH="{{.ARES_LOG_DIR}}/{{.ROLE}}.log"
          REMOTE_CMD="tail -n $REMOTE_LINES $LOG_PATH $FILTER"
          if ! run_ssm_cmd "$INSTANCE_ID" "$REMOTE_CMD" 60 \
            | strip_ansi \
            > "$OUT_FILE"; then
            echo -e "{{.ERROR}} Failed to fetch logs from $INSTANCE_ID"
            rm -f "$OUT_FILE"
            exit 1
          fi
        fi

        LINE_COUNT=$(wc -l < "$OUT_FILE" | tr -d ' ')
        BYTE_COUNT=$(wc -c < "$OUT_FILE" | tr -d ' ')
        echo -e "{{.INFO}} Fetched $LINE_COUNT lines ($BYTE_COUNT bytes) from {{.ROLE}} log on $INSTANCE_ID"
        if [ -n "{{.OP_ID}}" ]; then
          echo -e "{{.INFO}} Filtered by OP_ID={{.OP_ID}}"
        fi
        if [ -n "{{.SINCE}}" ]; then
          echo -e "{{.INFO}} Filtered by SINCE={{.SINCE}}"
        fi
        echo "$OUT_FILE"

  # ============================================================================
  # Redis Port Forward
  # ============================================================================
  redis:forward:
    desc: "SSM port-forward Redis to localhost:16379 for local CLI access (usage: task ec2:redis:forward [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh
        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        # Kill any stale port-forward
        lsof -ti:16379 | xargs kill 2>/dev/null || true
        sleep 1

        echo -e "{{.INFO}} Port-forwarding Redis: localhost:16379 -> $INSTANCE_ID:6379"
        echo -e "{{.INFO}} Use: ARES_REDIS_URL=redis://localhost:16379 ares ops loot --latest"
        echo -e "{{.INFO}} Press Ctrl+C to stop"
        echo ""

        aws ssm start-session \
          {{.AWS_PROFILE_ARG}} \
          --region "{{.AWS_REGION}}" \
          --target "$INSTANCE_ID" \
          --document-name "AWS-StartPortForwardingSession" \
          --parameters '{"portNumber":["6379"],"localPortNumber":["16379"]}'

  nats:forward:
    desc: "SSM port-forward NATS to localhost:14222 for local CLI access (usage: task ec2:nats:forward [EC2_NAME=kali-ares])"
    silent: true
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh
        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        lsof -ti:14222 | xargs kill 2>/dev/null || true
        sleep 1

        echo -e "{{.INFO}} Port-forwarding NATS: localhost:14222 -> $INSTANCE_ID:4222"
        echo -e "{{.INFO}} Use: NATS_URL=nats://localhost:14222 (pair with ARES_REDIS_URL=redis://localhost:16379)"
        echo -e "{{.INFO}} Press Ctrl+C to stop"
        echo ""

        aws ssm start-session \
          {{.AWS_PROFILE_ARG}} \
          --region "{{.AWS_REGION}}" \
          --target "$INSTANCE_ID" \
          --document-name "AWS-StartPortForwardingSession" \
          --parameters '{"portNumber":["4222"],"localPortNumber":["14222"]}'

  # ============================================================================
  # CLI Operations (loot, runtime, report, list)
  # These use `ares --ec2` which handles instance resolution and SSM.
  # ============================================================================
  loot:
    desc: "Dump loot from EC2 via SSM (usage: task ec2:loot [EC2_NAME=ares-tools] [LATEST=true] [OPERATION_ID=op-xxx] [JSON=false] [DIFF=false])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "true"}}'
      JSON: '{{.JSON | default "false"}}'
      DIFF: '{{.DIFF | default "false"}}'
    cmd: >-
      {{.ARES_CLI}} --ec2 {{.EC2_NAME}} --ec2-profile {{.AWS_PROFILE}} --ec2-region {{.AWS_REGION}}
      ops loot
      {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
      {{if eq .LATEST "true"}}--latest{{end}}
      {{if eq .JSON "true"}}--json{{end}}
      {{if eq .DIFF "true"}}--diff{{end}}

  runtime:
    desc: "Show operation runtime from EC2 via SSM (usage: task ec2:runtime [EC2_NAME=ares-tools] [LATEST=true] [OPERATION_ID=op-xxx])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "true"}}'
    cmd: >-
      {{.ARES_CLI}} --ec2 {{.EC2_NAME}} --ec2-profile {{.AWS_PROFILE}} --ec2-region {{.AWS_REGION}}
      ops runtime
      {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
      {{if eq .LATEST "true"}}--latest{{end}}

  report:
    desc: "Generate and fetch report from EC2 (usage: task ec2:report [EC2_NAME=kali-ares] [LATEST=true] [OPERATION_ID=op-xxx] [REGENERATE=false])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "true"}}'
      REGENERATE: '{{.REGENERATE | default "false"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        REPORT_ARGS=""
        {{if ne .OPERATION_ID ""}}REPORT_ARGS="$REPORT_ARGS {{.OPERATION_ID}}"{{end}}
        {{if eq .LATEST "true"}}REPORT_ARGS="$REPORT_ARGS --latest"{{end}}
        {{if eq .REGENERATE "true"}}REPORT_ARGS="$REPORT_ARGS --regenerate"{{end}}
        REPORT_CMD="set +e"
        REPORT_CMD="$REPORT_CMD; OUTPUT=\$(RUST_LOG=error ares ops report${REPORT_ARGS} --output-dir /tmp/reports 2>&1)"
        REPORT_CMD="$REPORT_CMD; RC=\$?; set -e; echo \"\$OUTPUT\"; if [ \$RC -ne 0 ]; then exit \$RC; fi"
        REPORT_CMD="$REPORT_CMD; REPORT_PATH=\$(printf '%s\n' \"\$OUTPUT\" | sed -n 's/^Report saved to \([^ ]*\.md\).*/\1/p' | tail -1)"
        REPORT_CMD="$REPORT_CMD; echo '===REPORT_META==='"
        REPORT_CMD="$REPORT_CMD; if [ -z \"\$REPORT_PATH\" ]; then echo 'ERROR: could not parse report path from ares output' >&2; exit 1; fi"
        REPORT_CMD="$REPORT_CMD; if [ ! -f \"\$REPORT_PATH\" ]; then echo \"ERROR: report file not found: \$REPORT_PATH\" >&2; exit 1; fi"
        REPORT_CMD="$REPORT_CMD; echo \"FILE:red/\$(basename \"\$REPORT_PATH\")\""
        REPORT_CMD="$REPORT_CMD; echo \"PATH:\$REPORT_PATH\""
        REPORT_CMD="$REPORT_CMD; echo \"BYTES:\$(wc -c < \"\$REPORT_PATH\" | tr -d ' ')\""
        REPORT_CMD="$REPORT_CMD; echo \"SHA256:\$(sha256sum \"\$REPORT_PATH\" | awk '{print \$1}')\""

        echo -e "{{.INFO}} Generating report on EC2..."

        OUTPUT=$(run_ssm_cmd "$INSTANCE_ID" "$REPORT_CMD" 120)
        BEFORE_MARKER=$(echo "$OUTPUT" | sed '/===REPORT_META===/,$d')
        META=$(echo "$OUTPUT" | sed -n '/===REPORT_META===/,$p' | tail -n +2)

        echo "$BEFORE_MARKER"

        FILENAME=$(echo "$META" | sed -n 's/^FILE://p' | head -1)
        REMOTE_PATH=$(echo "$META" | sed -n 's/^PATH://p' | head -1)
        REMOTE_BYTES=$(echo "$META" | sed -n 's/^BYTES://p' | head -1)
        REMOTE_SHA=$(echo "$META" | sed -n 's/^SHA256://p' | head -1)

        if [ -z "$FILENAME" ] || [ -z "$REMOTE_PATH" ] || [ -z "$REMOTE_BYTES" ] || [ -z "$REMOTE_SHA" ]; then
          echo -e "{{.ERROR}} Could not parse report metadata from EC2 output" >&2
          exit 1
        fi

        mkdir -p "{{.OUTPUT_DIR}}/red"
        OUTFILE="{{.OUTPUT_DIR}}/$FILENAME"
        TMP_OUT="${OUTFILE}.tmp.$$"
        : > "$TMP_OUT"
        trap "rm -f '$TMP_OUT'" EXIT

        CHUNK_SIZE=12000
        CHUNKS=$(( (REMOTE_BYTES + CHUNK_SIZE - 1) / CHUNK_SIZE ))
        echo -e "{{.INFO}} Fetching $REMOTE_BYTES bytes from EC2 in $CHUNKS chunks..."

        CHUNK=0
        while [ $CHUNK -lt $CHUNKS ]; do
          CHUNK_CMD="dd if=\"$REMOTE_PATH\" bs=$CHUNK_SIZE skip=$CHUNK count=1 status=none | base64 | tr -d '\n'"
          CHUNK_B64=$(run_ssm_cmd "$INSTANCE_ID" "$CHUNK_CMD" 30)
          if ! printf '%s' "$CHUNK_B64" | base64 -d >> "$TMP_OUT"; then
            echo -e "{{.ERROR}} Failed to decode report chunk $((CHUNK + 1))/$CHUNKS" >&2
            exit 1
          fi
          CHUNK=$((CHUNK + 1))
        done

        LOCAL_BYTES=$(wc -c < "$TMP_OUT" | tr -d ' ')
        if [ "$LOCAL_BYTES" != "$REMOTE_BYTES" ]; then
          echo -e "{{.ERROR}} Report size mismatch: remote=$REMOTE_BYTES local=$LOCAL_BYTES" >&2
          exit 1
        fi

        if command -v sha256sum >/dev/null 2>&1; then
          LOCAL_SHA=$(sha256sum "$TMP_OUT" | awk '{print $1}')
        else
          LOCAL_SHA=$(shasum -a 256 "$TMP_OUT" | awk '{print $1}')
        fi
        if [ "$LOCAL_SHA" != "$REMOTE_SHA" ]; then
          echo -e "{{.ERROR}} Report checksum mismatch: remote=$REMOTE_SHA local=$LOCAL_SHA" >&2
          exit 1
        fi

        mv "$TMP_OUT" "$OUTFILE"
        echo -e "{{.SUCCESS}} Report saved: $OUTFILE"

  ops:
    desc: "List all operations on EC2 (usage: task ec2:ops [EC2_NAME=ares-tools] [LATEST=true])"
    silent: true
    vars:
      LATEST: '{{.LATEST | default "false"}}'
    cmd: >-
      {{.ARES_CLI}} --ec2 {{.EC2_NAME}} --ec2-profile {{.AWS_PROFILE}} --ec2-region {{.AWS_REGION}}
      ops list
      {{if eq .LATEST "true"}}--latest{{end}}

  ops:ids:
    desc: "List all operation IDs on EC2 with started_at + derived status, columns separated by ' | ' (usage: task ec2:ops:ids [EC2_NAME=kali-ares])"
    silent: true
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        PAYLOAD=$(cat .taskfiles/ec2/scripts/list-ops.sh)
        run_ssm_cmd "$INSTANCE_ID" "$PAYLOAD" 60

  # ============================================================================
  # Watch + auto-report
  # ============================================================================
  watch:
    desc: "Poll EC2 operation until complete, then auto-fetch the report locally (usage: task ec2:watch [EC2_NAME=kali-ares] [LATEST=true] [OPERATION_ID=op-xxx] [POLL_INTERVAL=30] [MAX_WAIT=7200] [OUTPUT_DIR=./reports])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "true"}}'
      POLL_INTERVAL: '{{.POLL_INTERVAL | default "30"}}'
      MAX_WAIT: '{{.MAX_WAIT | default "7200"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
    cmds:
      - |
        if [ -z "{{.OPERATION_ID}}" ] && [ "{{.LATEST}}" != "true" ]; then
          echo -e "{{.ERROR}} Either OPERATION_ID or LATEST=true is required"
          exit 1
        fi

        OP_ARG=""
        LATEST_FLAG=""
        if [ -n "{{.OPERATION_ID}}" ]; then
          OP_ARG="{{.OPERATION_ID}}"
        else
          LATEST_FLAG="--latest"
        fi

        START=$(date +%s)
        echo -e "{{.INFO}} Watching EC2 operation (poll={{.POLL_INTERVAL}}s, max_wait={{.MAX_WAIT}}s)"
        echo -e "{{.INFO}} Will fetch report to {{.OUTPUT_DIR}}/red/ when the op reaches a terminal state"

        RESOLVED_OP=""
        while true; do
          ELAPSED=$(( $(date +%s) - START ))
          if [ $ELAPSED -gt {{.MAX_WAIT}} ]; then
            echo -e "{{.ERROR}} Max wait ({{.MAX_WAIT}}s) exceeded, giving up"
            exit 1
          fi

          STATUS_OUT=$({{.ARES_CLI}} --ec2 {{.EC2_NAME}} --ec2-profile {{.AWS_PROFILE}} --ec2-region {{.AWS_REGION}} \
            ops status $OP_ARG $LATEST_FLAG 2>&1 || true)

          STATUS=$(echo "$STATUS_OUT" | grep -E '^Status: ' | head -1 | awk '{print $2}')
          OP_ID=$(echo "$STATUS_OUT" | grep -E '^Operation: ' | head -1 | awk '{print $2}')
          if [ -n "$OP_ID" ]; then
            RESOLVED_OP="$OP_ID"
          fi

          if [ -z "$STATUS" ]; then
            echo -e "{{.WARN}} [${ELAPSED}s] no status yet (waiting for op to register)"
          else
            echo -e "{{.INFO}} [${ELAPSED}s] op=${RESOLVED_OP:-?} status=$STATUS"
            case "$STATUS" in
              completed|stopped)
                echo -e "{{.SUCCESS}} Operation reached terminal state: $STATUS"
                break
                ;;
            esac
          fi

          sleep {{.POLL_INTERVAL}}
        done

        if [ -z "$RESOLVED_OP" ]; then
          echo -e "{{.ERROR}} Could not resolve operation ID — cannot fetch report"
          exit 1
        fi

        echo -e "{{.INFO}} Fetching report for $RESOLVED_OP..."
        task ec2:report EC2_NAME={{.EC2_NAME}} OPERATION_ID=$RESOLVED_OP OUTPUT_DIR={{.OUTPUT_DIR}}

  # ============================================================================
  # Operation Launch
  # ============================================================================
  launch:
    desc: "Launch orchestrator on EC2 via Secrets Manager (usage: task ec2:launch EC2_NAME=kali-ares [DOMAIN=...] [TARGETS=...] [CRED_USER=...] [CRED_PASS=...] [WAIT=true] [POLL_INTERVAL=30])"
    silent: true
    vars:
      DOMAIN: '{{.DOMAIN | default "sevenkingdoms.local"}}'
      # Either a range name (e.g. `dreadgoad`, resolved via EC2 Name tag glob
      # `*<name>*` — see resolve_targets in run-ssm.sh) or a literal
      # comma-separated IP list. The name form is preferred because it stays
      # correct when the range is redeployed and its IPs change.
      TARGETS: '{{.TARGETS | default "dreadgoad"}}'
      CRED_USER: '{{.CRED_USER | default "samwell.tarly"}}'
      CRED_PASS: '{{.CRED_PASS | default "Heartsbane"}}'
      CRED_DOMAIN: '{{.CRED_DOMAIN | default "north.sevenkingdoms.local"}}'
      SECRETS_ID: '{{.SECRETS_ID | default "ares/api-keys"}}'
      # Postgres history DB (ares-history). The orchestrator's projector + op
      # finalizer persist every run here so red ops are comparable across runs.
      # Password comes from Secrets Manager (never committed); host/user/db are
      # stable lab defaults. Set RDS_SECRET_ID="" to disable SQL persistence, or
      # pass ARES_DATABASE_URL=... to override the constructed URL entirely.
      ARES_DATABASE_URL: '{{.ARES_DATABASE_URL | default ""}}'
      RDS_SECRET_ID: '{{.RDS_SECRET_ID | default "ares/rds/master"}}'
      RDS_ENDPOINT: '{{.RDS_ENDPOINT | default "ares-history.cr8uqakiuqnq.us-west-1.rds.amazonaws.com"}}'
      RDS_USER: '{{.RDS_USER | default "ares_admin"}}'
      RDS_DB: '{{.RDS_DB | default "ares_history"}}'
      LLM_MODEL: '{{.LLM_MODEL | default ""}}'
      FLUSH_REDIS: '{{.FLUSH_REDIS | default "true"}}'
      # Observability endpoint overrides — take precedence over Secrets Manager
      # values so laptop-shape URLs in ares/api-keys (e.g. http://localhost:3000
      # from the obs:forward pattern) don't wedge on the EC2 box, which reaches
      # observability via VPC peering to the plundr ingress instead.
      EC2_GRAFANA_URL: '{{.EC2_GRAFANA_URL | default "https://grafana.dev.plundr.ai"}}'
      EC2_LOKI_URL: '{{.EC2_LOKI_URL | default "https://loki.dev.plundr.ai"}}'
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      WAIT: '{{.WAIT | default "true"}}'
      POLL_INTERVAL: '{{.POLL_INTERVAL | default "30"}}'
      MAX_WAIT: '{{.MAX_WAIT | default "7200"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
      # Opt-in: auto-capture a benchmark snapshot once the op completes (WAIT=true).
      CAPTURE: '{{.CAPTURE | default "false"}}'
      # Blue-team mode {off, replay, live}. This task is a direct-launch escape
      # hatch (not the normal launcher), so default off. red:ec2:multi is the
      # user-facing task and it defaults to replay.
      BLUE_MODE: '{{.BLUE_MODE | default "off"}}'
      # Per-op strategy knobs plumbed into the ARES_OPERATION_ID JSON payload.
      # Empty means "don't override" — Strategy::resolve falls through to YAML.
      STRATEGY: '{{.STRATEGY | default ""}}'
      EXCLUDE_TECHNIQUES: '{{.EXCLUDE_TECHNIQUES | default ""}}'
      CONTINUE_AFTER_DA: '{{.CONTINUE_AFTER_DA | default ""}}'
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        if [ -n "{{.OPERATION_ID}}" ]; then
          OP_ID="{{.OPERATION_ID}}"
        else
          OP_ID="op-$(date -u +%Y%m%d-%H%M%S)"
        fi
        echo -e "{{.INFO}} Operation ID: $OP_ID"

        # Resolve TARGETS: literal IP list stays as-is; anything else is treated
        # as an EC2 Name-tag range (e.g. `dreadgoad`) and expanded via
        # resolve_targets so redeployed ranges Just Work.
        TARGETS_RAW='{{.TARGETS}}'
        if echo "$TARGETS_RAW" | grep -qE '^[0-9., ]+$'; then
          TARGETS_RESOLVED="$TARGETS_RAW"
        else
          TARGETS_RESOLVED=$(resolve_targets "$TARGETS_RAW") || exit 1
          echo -e "{{.INFO}} Resolved TARGETS=$TARGETS_RAW → $TARGETS_RESOLVED"
        fi
        TARGET_ARRAY=$(echo "$TARGETS_RESOLVED" | tr ',' '\n' | jq -R . | jq -sc .)

        # Optional per-op strategy overrides. Empty vars are omitted so the
        # orchestrator's Strategy::resolve falls through to YAML/preset defaults.
        EXTRA_JQ=""
        EXTRA_ARGS=()
        if [ -n "{{.STRATEGY}}" ]; then
          EXTRA_JQ="$EXTRA_JQ | .strategy = \$strategy"
          EXTRA_ARGS+=(--arg strategy "{{.STRATEGY}}")
        fi
        if [ -n "{{.EXCLUDE_TECHNIQUES}}" ]; then
          EXCLUDE_ARRAY=$(echo '{{.EXCLUDE_TECHNIQUES}}' | tr ',' '\n' | sed '/^$/d' | jq -R . | jq -sc .)
          EXTRA_JQ="$EXTRA_JQ | .exclude_techniques = \$exclude"
          EXTRA_ARGS+=(--argjson exclude "$EXCLUDE_ARRAY")
        fi
        if [ -n "{{.CONTINUE_AFTER_DA}}" ]; then
          case "{{.CONTINUE_AFTER_DA}}" in
            true|1|yes) CAD_BOOL=true ;;
            *) CAD_BOOL=false ;;
          esac
          EXTRA_JQ="$EXTRA_JQ | .continue_after_da = \$cad"
          EXTRA_ARGS+=(--argjson cad "$CAD_BOOL")
        fi

        PAYLOAD=$(jq -c -n \
          --arg op_id "$OP_ID" \
          --arg domain "{{.DOMAIN}}" \
          --argjson targets "$TARGET_ARRAY" \
          --arg user "{{.CRED_USER}}" \
          --arg pass "{{.CRED_PASS}}" \
          --arg cred_domain "{{.CRED_DOMAIN}}" \
          "${EXTRA_ARGS[@]}" \
          "{
            \"operation_id\": \$op_id,
            \"target_domain\": \$domain,
            \"target_ips\": \$targets,
            \"initial_credential\": { \"username\": \$user, \"password\": \$pass, \"domain\": \$cred_domain }
          } $EXTRA_JQ")

        # Fetch API keys from Secrets Manager
        SECRETS=$(aws secretsmanager get-secret-value \
          {{.AWS_PROFILE_ARG}} \
          --region "{{.AWS_REGION}}" \
          --secret-id "{{.SECRETS_ID}}" \
          --query SecretString --output text 2>/dev/null) || true

        if [ -z "$SECRETS" ]; then
          echo -e "{{.ERROR}} Failed to fetch API keys from Secrets Manager ({{.SECRETS_ID}})"
          echo -e "{{.INFO}} Create with: aws secretsmanager create-secret --name ares/api-keys --secret-string '{\"OPENAI_API_KEY\":\"...\",\"ANTHROPIC_API_KEY\":\"...\"}'"
          exit 1
        fi

        OPENAI_KEY=$(echo "$SECRETS" | jq -r .OPENAI_API_KEY)
        ANTHROPIC_KEY=$(echo "$SECRETS" | jq -r .ANTHROPIC_API_KEY)
        GRAFANA_URL_VAL=$(echo "$SECRETS" | jq -r '.GRAFANA_URL // empty')
        GRAFANA_TOKEN_VAL=$(echo "$SECRETS" | jq -r '.GRAFANA_SERVICE_ACCOUNT_TOKEN // empty')
        LOKI_URL_VAL=$(echo "$SECRETS" | jq -r '.LOKI_URL // empty')
        if [ -z "$LOKI_URL_VAL" ]; then
          LOKI_URL_VAL="{{.LOKI_URL}}"
        fi
        LOKI_AUTH_TOKEN_VAL=$(echo "$SECRETS" | jq -r '.LOKI_AUTH_TOKEN // empty')

        # EC2 override: the secret's GRAFANA_URL/LOKI_URL are laptop-shape
        # (localhost:PORT from `task obs:forward`) and never pass the reachability
        # probe below. On EC2 we always want the plundr ingress URL, which is
        # reachable via VPC peering. Override iff the task var is set (default:
        # the plundr ingress). Set EC2_GRAFANA_URL="" / EC2_LOKI_URL="" to keep
        # the secret's value verbatim.
        if [ -n "{{.EC2_GRAFANA_URL}}" ]; then
          GRAFANA_URL_VAL="{{.EC2_GRAFANA_URL}}"
        fi
        if [ -n "{{.EC2_LOKI_URL}}" ]; then
          LOKI_URL_VAL="{{.EC2_LOKI_URL}}"
        fi
        DREADNODE_API_KEY=$(echo "$SECRETS" | jq -r '.DREADNODE_API_KEY // empty')

        # Build ARES_DATABASE_URL for the ares-history Postgres so the
        # orchestrator's projector + op finalizer persist every run to SQL.
        # Explicit ARES_DATABASE_URL wins; otherwise construct it from the RDS
        # master password in Secrets Manager. The password stays out of git and
        # the /etc/ares/env file is chmod 600 below.
        ARES_DATABASE_URL_VAL="{{.ARES_DATABASE_URL}}"
        if [ -z "$ARES_DATABASE_URL_VAL" ] && [ -n "{{.RDS_SECRET_ID}}" ]; then
          DB_PASSWORD=$(aws secretsmanager get-secret-value \
            {{.AWS_PROFILE_ARG}} \
            --region "{{.AWS_REGION}}" \
            --secret-id "{{.RDS_SECRET_ID}}" \
            --query SecretString --output text 2>/dev/null) || true
          if [ -n "$DB_PASSWORD" ]; then
            ARES_DATABASE_URL_VAL="postgresql://{{.RDS_USER}}:${DB_PASSWORD}@{{.RDS_ENDPOINT}}:5432/{{.RDS_DB}}"
          else
            echo -e "{{.WARN}} could not read {{.RDS_SECRET_ID}} — SQL history persistence disabled for this op" >&2
          fi
        fi

        # Parse host:port from URLs for box-side reachability probes. The
        # observability endpoints in Secrets Manager may live in a VPC the box
        # can't reach (e.g. loki.dev.plundr.ai is behind the plundr VPC ingress
        # while personal-account kali-ares is in a separate VPC with no
        # peering). We probe TCP connect from the box and only inject the
        # values if the probe succeeds — blue tools then fall through to their
        # built-in defaults instead of wedging on a black-holed URL.
        _url_host() { printf %s "$1" | awk -F/ '{print $3}' | cut -d: -f1; }
        _url_port() { case "$1" in http://*) echo 80 ;; https://*|*) echo 443 ;; esac; }
        GRAFANA_HOST=$(_url_host "$GRAFANA_URL_VAL"); GRAFANA_PORT=$(_url_port "$GRAFANA_URL_VAL")
        LOKI_HOST=$(_url_host "$LOKI_URL_VAL");       LOKI_PORT=$(_url_port "$LOKI_URL_VAL")
        OTEL_TRACES_ENDPOINT="{{.OTEL_TRACES_ENDPOINT}}"

        FLUSH_CMD=""
        if [ "{{.FLUSH_REDIS}}" = "true" ]; then
          FLUSH_CMD="redis-cli FLUSHDB; echo Redis flushed;"
        fi

        # Write shared env vars for workers (EnvironmentFile in systemd template).
        # Values are printf %q-escaped so shell metachars in secrets
        # (parens/semicolons/dollars in RDS passwords) survive `. /etc/ares/env`.
        # Writes go through a tmp file + mv so concurrent launches don't
        # interleave partial content into /etc/ares/env.
        ENV_FILE_CMD="mkdir -p /etc/ares; ENV_TMP=\$(mktemp /etc/ares/.env.XXXXXX)"
        ENV_FILE_CMD="$ENV_FILE_CMD; printf 'OPENAI_API_KEY=%q\n' '${OPENAI_KEY}' > \$ENV_TMP"
        if [ -n "$GRAFANA_URL_VAL" ]; then
          ENV_FILE_CMD="$ENV_FILE_CMD; if timeout 3 bash -c '>/dev/tcp/${GRAFANA_HOST}/${GRAFANA_PORT}' 2>/dev/null; then printf 'GRAFANA_URL=%q\n' '${GRAFANA_URL_VAL}' >> \$ENV_TMP"
          if [ -n "$GRAFANA_TOKEN_VAL" ]; then
            ENV_FILE_CMD="$ENV_FILE_CMD; printf 'GRAFANA_SERVICE_ACCOUNT_TOKEN=%q\n' '${GRAFANA_TOKEN_VAL}' >> \$ENV_TMP"
          fi
          ENV_FILE_CMD="$ENV_FILE_CMD; else echo 'SKIP: GRAFANA_URL ${GRAFANA_URL_VAL} unreachable from box' >&2; fi"
        fi
        if [ -n "$LOKI_URL_VAL" ]; then
          ENV_FILE_CMD="$ENV_FILE_CMD; if timeout 3 bash -c '>/dev/tcp/${LOKI_HOST}/${LOKI_PORT}' 2>/dev/null; then printf 'LOKI_URL=%q\n' '${LOKI_URL_VAL}' >> \$ENV_TMP"
          if [ -n "$LOKI_AUTH_TOKEN_VAL" ]; then
            ENV_FILE_CMD="$ENV_FILE_CMD; printf 'LOKI_AUTH_TOKEN=%q\n' '${LOKI_AUTH_TOKEN_VAL}' >> \$ENV_TMP"
          fi
          ENV_FILE_CMD="$ENV_FILE_CMD; else echo 'SKIP: LOKI_URL ${LOKI_URL_VAL} unreachable from box' >&2; fi"
        fi
        ENV_FILE_CMD="$ENV_FILE_CMD; printf 'ARES_DEPLOYMENT=%q\n' '{{.EC2_DEPLOYMENT}}' >> \$ENV_TMP"
        ENV_FILE_CMD="$ENV_FILE_CMD; printf 'NATS_URL=%q\n' 'nats://127.0.0.1:4222' >> \$ENV_TMP"
        # hashcat -w workload profile (cracker.rs hashcat_workload()). The box is a
        # headless g4dn T4; the default -w2 autotunes a tiny kernel-accel that
        # starves the GPU under fleet load (measured ~8% util on 19700). -w4 pins
        # the T4 ~100% and is +50% on AES kerberoast. Code default is 3 (portable);
        # override to 4 here for the dedicated cracker box.
        ENV_FILE_CMD="$ENV_FILE_CMD; printf 'ARES_HASHCAT_WORKLOAD=%q\n' '4' >> \$ENV_TMP"
        # systemd gives system services no HOME; ares reads \$HOME to locate hashcat's
        # potfile for the per-op wipe (PotfileResetGuard). Without it the resolver
        # returns None and the wipe silently no-ops, leaking prior ops' cracks.
        ENV_FILE_CMD="$ENV_FILE_CMD; printf 'HOME=%q\n' '/root' >> \$ENV_TMP"
        # OTEL: send traces to Alloy OTLP gateway → Tempo via HTTP/protobuf
        ENV_FILE_CMD="$ENV_FILE_CMD; printf 'OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=%q\n' '${OTEL_TRACES_ENDPOINT}' >> \$ENV_TMP"
        ENV_FILE_CMD="$ENV_FILE_CMD; printf 'OTEL_EXPORTER_OTLP_PROTOCOL=%q\n' 'http/protobuf' >> \$ENV_TMP"
        ENV_FILE_CMD="$ENV_FILE_CMD; printf 'OTEL_RESOURCE_ATTRIBUTES=%q\n' 'deployment.environment=staging,attack.team=red' >> \$ENV_TMP"
        # JSONL session log capture (ingested into Postgres llm_messages / tool_calls).
        # Env var name per ares-llm/src/agent_loop/config.rs.
        ENV_FILE_CMD="$ENV_FILE_CMD; printf 'ARES_SESSION_LOG_DIR=%q\n' '/var/log/ares/session' >> \$ENV_TMP"
        ENV_FILE_CMD="$ENV_FILE_CMD; mkdir -p /var/log/ares/session && chmod 0755 /var/log/ares/session"
        # ares-history Postgres — gated on box→RDS reachability (5432) so an
        # unreachable DB never wedges orchestrator startup; the projector +
        # finalizer both no-op cleanly when ARES_DATABASE_URL is absent.
        if [ -n "$ARES_DATABASE_URL_VAL" ]; then
          ENV_FILE_CMD="$ENV_FILE_CMD; if timeout 3 bash -c '>/dev/tcp/{{.RDS_ENDPOINT}}/5432' 2>/dev/null; then printf 'ARES_DATABASE_URL=%q\n' '${ARES_DATABASE_URL_VAL}' >> \$ENV_TMP; else echo 'SKIP: ARES_DATABASE_URL {{.RDS_ENDPOINT}}:5432 unreachable from box' >&2; fi"
        fi
        ENV_FILE_CMD="$ENV_FILE_CMD; chmod 600 \$ENV_TMP; mv \$ENV_TMP /etc/ares/env; echo Wrote /etc/ares/env"

        LAUNCH_SCRIPT="#!/bin/bash
        set -e
        ${ENV_FILE_CMD}
        ${FLUSH_CMD}
        pkill -f 'ares orchestrator' 2>/dev/null || true; sleep 1
        export OPENAI_API_KEY='${OPENAI_KEY}'
        export ANTHROPIC_API_KEY='${ANTHROPIC_KEY}'
        # Observability endpoints (GRAFANA_URL/LOKI_URL and tokens) are gated by
        # the box-side probe above and only appear in /etc/ares/env when
        # reachable. Source rather than re-export so we never leak an
        # unreachable URL from Secrets Manager into the orchestrator process.
        set -a; . /etc/ares/env; set +a
        export ARES_REDIS_URL=redis://127.0.0.1:6379
        export NATS_URL=nats://127.0.0.1:4222
        {{- if .LLM_MODEL}}
        export ARES_LLM_MODEL='{{.LLM_MODEL}}'
        {{- end}}
        export RUST_LOG=info
        export ARES_CONFIG={{.ARES_REMOTE_CONFIG}}
        export ARES_BLUE_ENABLED=1
        export ARES_DEPLOYMENT='{{.EC2_DEPLOYMENT}}'
        export OTEL_EXPORTER_OTLP_TRACES_ENDPOINT='${OTEL_TRACES_ENDPOINT}'
        export OTEL_EXPORTER_OTLP_PROTOCOL='http/protobuf'
        export OTEL_RESOURCE_ATTRIBUTES='deployment.environment=staging,attack.team=red'
        export ARES_OPERATION_ID='${PAYLOAD}'
        mkdir -p {{.ARES_LOG_DIR}}
        nohup /usr/local/bin/ares orchestrator >{{.ARES_LOG_DIR}}/orchestrator.log 2>&1 &
        sleep 2
        if pgrep -f 'ares orchestrator' >/dev/null; then
          echo Orchestrator started for ${OP_ID}
          head -5 {{.ARES_LOG_DIR}}/orchestrator.log
        else
          echo FAILED TO START
          cat {{.ARES_LOG_DIR}}/orchestrator.log | head -20; exit 1
        fi"

        B64=$(echo "$LAUNCH_SCRIPT" | base64)
        LAUNCH_PAYLOAD="echo $B64 | base64 -d | /bin/bash"

        echo -e "{{.INFO}} Launching orchestrator on $INSTANCE_ID..."

        run_ssm_cmd "$INSTANCE_ID" "$LAUNCH_PAYLOAD" 30 || exit 1

        echo -e "{{.SUCCESS}} Operation $OP_ID launched"
        echo -e "{{.INFO}} Monitor: task ec2:runtime EC2_NAME={{.EC2_NAME}}"

        if [ "{{.WAIT}}" = "true" ]; then
          echo -e "{{.INFO}} WAIT=true — handing off to ec2:watch (auto-fetch report on completion)"
          task ec2:watch \
            EC2_NAME={{.EC2_NAME}} \
            OPERATION_ID="$OP_ID" \
            POLL_INTERVAL={{.POLL_INTERVAL}} \
            MAX_WAIT={{.MAX_WAIT}} \
            OUTPUT_DIR={{.OUTPUT_DIR}}

          # Opt-in benchmark capture, client-side. Runs here (this host has the
          # infra + lab creds the account-segmented box lacks) rather than on the
          # box. Flush-aware: --wait-for-flush blocks until Loki has flushed the
          # attack window to S3. Non-fatal — the op is finalized regardless.
          if [ "{{.CAPTURE}}" = "true" ]; then
            echo -e "{{.INFO}} CAPTURE=true — auto-capturing benchmark snapshot for $OP_ID (waits for Loki flush)"
            ATTACKER_IP=$(aws ec2 describe-instances {{.AWS_PROFILE_ARG}} --region "{{.AWS_REGION}}" \
              --instance-ids "$INSTANCE_ID" \
              --query "Reservations[0].Instances[0].PrivateIpAddress" --output text 2>/dev/null) || true
            lsof -ti:16379 | xargs kill 2>/dev/null || true; sleep 1
            aws ssm start-session {{.AWS_PROFILE_ARG}} --region "{{.AWS_REGION}}" --target "$INSTANCE_ID" \
              --document-name AWS-StartPortForwardingSession \
              --parameters '{"portNumber":["6379"],"localPortNumber":["16379"]}' >/tmp/ares-capture-fwd.log 2>&1 &
            PF_PID=$!
            for _ in $(seq 1 20); do nc -z localhost 16379 2>/dev/null && break; sleep 2; done
            {{.ARES_CLI}} benchmark capture "$OP_ID" \
              --redis-url redis://localhost:16379 \
              ${ATTACKER_IP:+--attacker-ips "$ATTACKER_IP"} \
              || echo -e "{{.WARN}} auto-capture failed — op is finalized; run 'ares benchmark capture $OP_ID' later (flush-wait is on by default)"
            kill "$PF_PID" 2>/dev/null || true
          fi
        fi

  # ============================================================================
  # Post-AMI Tool Setup
  # ============================================================================
  setup:tools:
    desc: "Install pentest tools on EC2 via pipx (usage: task ec2:setup:tools EC2_NAME=kali-ares)"
    silent: true
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh
        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        echo -e "{{.INFO}} Installing pentest tools on $INSTANCE_ID (2-3 minutes)..."
        run_ssm_cmd "$INSTANCE_ID" "$(cat .taskfiles/ec2/scripts/setup-tools.sh)" 600 || exit 1
        echo -e "{{.SUCCESS}} Tools installed on $INSTANCE_ID"

  logrotate:
    desc: "Install /etc/logrotate.d/ares on live EC2 via ansible+SSM (usage: task ec2:logrotate [EC2_NAME=kali-ares] S3_BUCKET=...)"
    silent: true
    preconditions:
      - sh: test -n "{{.S3_BUCKET}}"
        msg: "S3_BUCKET required (community.aws.aws_ssm connection stages transfers via S3). Export S3_BUCKET or pass it inline."
      - sh: command -v ansible-playbook >/dev/null
        msg: "ansible-playbook not found in PATH — install ansible-core (e.g. `pipx install ansible-core`)."
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1
        echo -e "{{.INFO}} Installing logrotate config on $INSTANCE_ID via ansible+SSM..."

        # The community.aws.aws_ssm plugin uses a botocore session that can't
        # refresh SSO tokens the way the CLI can — it just errors with
        # "Token has expired and refresh failed". Sidestep that by baking
        # freshly-exported creds from the profile into env vars, then
        # unsetting AWS_PROFILE so boto3 doesn't complain about both being set.
        unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN \
              AWS_SESSION_EXPIRATION AWS_CREDENTIAL_EXPIRATION
        if [ -n "$AWS_PROFILE" ]; then
          if ! eval "$(aws configure export-credentials --profile "$AWS_PROFILE" --format env 2>/dev/null)"; then
            echo -e "{{.ERROR}} Could not export creds from profile '$AWS_PROFILE'. Try 'aws sso login --profile $AWS_PROFILE'." >&2
            exit 1
          fi
          unset AWS_PROFILE
        fi

        # Idempotent: skips collections already at the pinned version.
        ansible-galaxy collection install -r ansible/requirements.yml >/dev/null

        # Extension matters — mktemp without .yml makes ansible fall back to
        # the ini inventory plugin, which chokes on the yaml `all:` key.
        INV_DIR=$(mktemp -d)
        trap 'rm -rf "$INV_DIR"' EXIT
        INV="$INV_DIR/inv.yml"
        cat > "$INV" <<EOF
        all:
          hosts:
            ares_attack_box:
              ansible_host: $INSTANCE_ID
              ansible_connection: community.aws.aws_ssm
              ansible_aws_ssm_bucket_name: {{.S3_BUCKET}}
              ansible_aws_ssm_region: {{.AWS_REGION}}
              ansible_python_interpreter: /usr/bin/python3
        EOF

        ANSIBLE_CONFIG=ansible/ansible.cfg \
          ansible-playbook -i "$INV" ansible/playbooks/ares/logrotate.yml

        echo -e "{{.SUCCESS}} logrotate config installed on $INSTANCE_ID"

  # ============================================================================
  # Arbitrary Command Execution
  # ============================================================================
  exec:
    desc: "Run a command on EC2 via SSM (usage: task ec2:exec EC2_NAME=ares-tools CMD='redis-cli info')"
    silent: true
    vars:
      CMD: '{{.CMD | default ""}}'
    preconditions:
      - sh: test -n "{{.CMD}}"
        msg: "CMD required. Usage: task ec2:exec CMD='redis-cli info keyspace'"
    cmds:
      - |
        {{.AWS_PROFILE_EXPORT}}
        export AWS_REGION="{{.AWS_REGION}}"
        . .taskfiles/ec2/scripts/run-ssm.sh

        INSTANCE_ID=$(resolve_instance_id "{{.EC2_NAME}}") || exit 1

        run_ssm_cmd "$INSTANCE_ID" "{{.CMD}}" 60 || exit 1
