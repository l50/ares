---
- name: Provision Windows Attack Range Target
  hosts: all
  gather_facts: false
  vars:
    ansible_os_family: "Windows"
    alloy_env: dev
    alloy_deployment_name: ""
    alloy_server_id: ""
    alloy_instance_id: ""
    alloy_loki_endpoint: "{{ alloy_loki_endpoint }}"
    alloy_version: "1.17.1"
    alloy_enable_sysmon: true

  roles:
    # Nimbus Range roles for Ansible system configuration and monitoring
    - role: dreadnode.nimbus_range.aws_ssm_agent
    - role: dreadnode.nimbus_range.aws_cloudwatch_agent

    # Install Sysmon before Alloy so the Sysmon event channel exists
    # when Alloy subscribes to it.
    - role: dreadnode.nimbus_range.sysmon

    # Install and configure Grafana Alloy for log shipping
    - role: dreadnode.nimbus_range.alloy
