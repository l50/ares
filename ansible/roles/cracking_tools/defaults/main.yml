---
# Password cracking tools
cracking_tools_install_hashcat: true
cracking_tools_install_john: true
cracking_tools_install_crackmapexec: false  # Legacy, prefer netexec

# Hashcat configuration
cracking_tools_hashcat_package: "hashcat"
cracking_tools_hashcat_from_source: false
cracking_tools_hashcat_repo: "https://github.com/hashcat/hashcat.git"
cracking_tools_hashcat_version: "master"
cracking_tools_libgcc_package_primary: "libgcc-s1"
cracking_tools_libgcc_package_fallback: "libgcc1"
cracking_tools_gcc_package_primary: "gcc"
cracking_tools_gcc_package_fallback: "gcc-15"

# John the Ripper configuration
cracking_tools_john_package: "john"
cracking_tools_john_from_source: false
cracking_tools_john_repo: "https://github.com/openwall/john.git"
cracking_tools_john_version: "bleeding-jumbo"

# Wordlists configuration
cracking_tools_install_wordlists: true
cracking_tools_wordlists:
  - rockyou
  - seclists_passwords

# RockYou wordlist
cracking_tools_rockyou_path: "/usr/share/wordlists/rockyou.txt"
cracking_tools_rockyou_gz_path: "/usr/share/wordlists/rockyou.txt.gz"
cracking_tools_extract_rockyou: true

# SecLists
cracking_tools_install_seclists: true
cracking_tools_seclists_repo: "https://github.com/danielmiessler/SecLists.git"
cracking_tools_seclists_path: "/usr/share/wordlists/seclists"

# Wordlist directory
cracking_tools_wordlist_dir: "/usr/share/wordlists"

# GPU support (for hashcat)
cracking_tools_gpu_support: false
cracking_tools_opencl_packages:
  - ocl-icd-libopencl1
  - opencl-headers
  - clinfo

# NVIDIA-specific GPU support
# Set to true when using nvidia/cuda base image to register NVIDIA OpenCL ICD
cracking_tools_nvidia_opencl_icd: false

# Install the NVIDIA kernel-mode driver + OpenCL runtime on the host. Required
# on bare-metal/AMI builds (g4dn etc.) where the Kali base image ships without
# any NVIDIA bits — without this hashcat reports "OpenCL platform not found".
# Leave false for container builds: the nvidia/cuda runtime base image
# already provides libnvidia-opencl/libcuda, and the kernel module comes
# from the host via nvidia-container-toolkit.
cracking_tools_install_nvidia_driver: false
# Install the full CUDA toolkit so hashcat can use the CUDA backend (faster
# than OpenCL on T4/A10/etc.). Pulls ~3GB; only enable on AMI builds.
cracking_tools_install_cuda_toolkit: false
# Recommends are intentionally enabled — DKMS, libcuda1, and the kernel
# module build chain come in via Recommends on Debian/Kali.
# Kali AMIs ship `+kali-cloud-amd64` kernel — needs the `cloud` headers
# meta-package. We pull driver + open-source kernel module from NVIDIA's
# CUDA Debian repo (added in tasks/linux.yml) because Kali's archive
# nvidia-driver (550.163.01) does not build against kernel 6.19+.
# `nvidia-kernel-open-dkms` is required for Turing+ (T4 included) on
# modern kernels; legacy `nvidia-kernel-dkms` is a dead-end here. Pair it
# with `nvidia-driver-cuda` (CUDA-only userspace) — the `cuda-drivers`
# meta and full `nvidia-driver` both pull `nvidia-kernel-dkms` (closed
# kernel module), which Conflicts with the open variant.
cracking_tools_nvidia_driver_packages:
  - linux-headers-cloud-amd64
  - dkms
  - firmware-misc-nonfree
  - nvidia-kernel-open-dkms
  - nvidia-driver-cuda
  - nvidia-opencl-icd
cracking_tools_nvidia_cuda_toolkit_packages:
  - nvidia-cuda-toolkit

cracking_tools_update_cache: true

# Remote crackd client config (HASHCAT_SERVICE_URL/HASHCAT_TOKEN).
# Enable per-host to point the local cracker worker at a remote hashcat
# service instead of failing GPU init on hosts without a usable backend.
# See ares-tools/src/cracker/remote.rs for the client contract.
cracking_tools_install_crackd_client: false
cracking_tools_crackd_url: ""
# 1Password lookup path for the bearer token, e.g.
# "op://<vault>/<item>/credential"
# Note: item titles in op:// references cannot contain parens or other
# special characters — use a slug-style title.
cracking_tools_crackd_op_path: ""
# systemd unit family that should receive the env file via drop-in.
# attacker-1 uses templated ares@<role>.service workers.
cracking_tools_crackd_systemd_unit: "ares@.service"
