---
# Install pipx for isolated Python application installation
# Recommended for NetExec installation
# Reference: https://www.netexec.wiki/getting-started/installation/installation-on-unix

- name: Install pipx via apt (Debian/Ubuntu)
  become: true
  when: ansible_facts['os_family'] == 'Debian'
  block:
    - name: Refresh apt cache before pipx install
      ansible.builtin.apt:
        update_cache: true
      # A cache refresh is not a meaningful state change; force it every run
      # (to dodge stale Kali-rolling indexes before the pipx apt install) but
      # don't report "changed", which would otherwise break idempotence.
      changed_when: false

    - name: Install pipx via apt
      ansible.builtin.apt:
        name:
          - pipx
        state: present
  rescue:
    # Kali rolling mirrors occasionally serve a Packages index that references
    # .deb files already pruned from the pool, causing 404s on dependency
    # downloads. Refresh once more and retry with --fix-missing to skip
    # any still-stale references.
    - name: Retry apt update after mirror miss
      ansible.builtin.command: apt-get update  # noqa: command-instead-of-module
      changed_when: true

    - name: Retry pipx install with --fix-missing
      ansible.builtin.command: apt-get install -y --fix-missing --no-install-recommends pipx  # noqa: command-instead-of-module
      changed_when: true

# Ubuntu 24.04's apt ships pipx 1.4.3, which predates the `--global` flag
# (added in pipx 1.5.0). Upgrade via pip so subsequent `pipx install --global`
# calls don't fail with "unrecognized arguments: --global".
- name: Check pipx version after apt install
  ansible.builtin.command: pipx --version
  register: base_pipx_apt_version
  changed_when: false
  failed_when: false

- name: Check whether pip supports --break-system-packages
  ansible.builtin.command: python3 -m pip install --help
  register: base_pipx_pip_help
  changed_when: false
  failed_when: false
  when:
    - base_pipx_apt_version.rc == 0
    - base_pipx_apt_version.stdout is version('1.5.0', '<')

- name: Upgrade pipx to a version supporting --global (>= 1.5.0)
  become: true
  ansible.builtin.pip:
    name: 'pipx>=1.5.0'
    state: latest
    extra_args: >-
      {{ '--break-system-packages'
         if (base_pipx_pip_help.stdout | default('')) is search('--break-system-packages')
         else '' }}
  when:
    - base_pipx_apt_version.rc == 0
    - base_pipx_apt_version.stdout is version('1.5.0', '<')

- name: Add pipx bin to system PATH via profile.d
  ansible.builtin.copy:
    content: |
      # pipx installations PATH
      if [ -d "/root/.local/bin" ]; then
        export PATH="/root/.local/bin:$PATH"
      fi
      if [ -d "$HOME/.local/bin" ]; then
        export PATH="$HOME/.local/bin:$PATH"
      fi
    dest: /etc/profile.d/pipx.sh
    mode: '0644'
  become: true

- name: Verify pipx installation
  ansible.builtin.command: pipx --version
  register: base_pipx_version
  changed_when: false
  failed_when: false

- name: Display pipx version
  ansible.builtin.debug:
    msg: "pipx installed: {{ base_pipx_version.stdout | default('Not available') }}"
