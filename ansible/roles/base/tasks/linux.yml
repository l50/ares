---
# The Ares toolchain installs to /usr/local/bin (uv, and the pipx/venv tool
# wrappers), but some images ship a sudoers secure_path that omits it, so every
# `become: true` task that calls a bare tool name fails to resolve it. Restore
# the standard secure_path via a validated drop-in (parsed after the main
# sudoers file, so it overrides). This must run first, before any tool install.
- name: Ensure sudo secure_path includes /usr/local
  ansible.builtin.copy:
    dest: /etc/sudoers.d/10-secure-path
    content: |
      Defaults secure_path="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Set DEBIAN_FRONTEND to noninteractive
  ansible.builtin.lineinfile:
    path: /etc/environment
    line: 'DEBIAN_FRONTEND=noninteractive'
    create: true
    mode: '0644'
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Python packages
  ansible.builtin.apt:
    name: "{{ base_python_packages }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Ubuntu-specific Python packages
  ansible.builtin.apt:
    name: "{{ base_python_packages_ubuntu }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'

- name: Install system utilities
  ansible.builtin.apt:
    name: "{{ base_system_packages }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Ubuntu-specific system packages
  ansible.builtin.apt:
    name: "{{ base_system_packages_ubuntu }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'

- name: Install Kali-specific system packages
  ansible.builtin.apt:
    name: "{{ base_system_packages_kali }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] == 'Kali'

# Suppress Kali MOTD (profile.d/kali.sh calls kali-motd which ignores .hushlogin)
- name: Remove kali-motd to suppress MOTD spam
  ansible.builtin.file:
    path: /usr/bin/kali-motd
    state: absent
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] == 'Kali'

- name: Install AWS CLI v2
  ansible.builtin.include_tasks: install_awscli.yml
  when: base_install_awscli

- name: Install uv package manager
  ansible.builtin.include_tasks: install_uv.yml
  when: base_install_uv

# Rust toolchain - required for building NetExec (aardwolf dependency)
# See: https://www.netexec.wiki/getting-started/installation/installation-on-unix
- name: Install Rust toolchain
  ansible.builtin.include_tasks: install_rust.yml
  when: base_install_rust

# pipx - recommended for NetExec installation
# See: https://www.netexec.wiki/getting-started/installation/installation-on-unix
- name: Install pipx
  ansible.builtin.include_tasks: install_pipx.yml
  when: base_install_pipx

- name: Set base tool paths for dependent roles
  ansible.builtin.set_fact:
    base_rust_bin_path: "/root/.cargo/bin"
    # pipx --global places apps under /usr/local/bin and venvs under
    # /opt/pipx/venvs. Using these instead of /root/.local/* makes the
    # tools accessible to non-root users (e.g., kali) as well, since
    # /root is mode 0700.
    base_pipx_bin_path: "/usr/local/bin"
    base_pipx_venv_path: "/opt/pipx/venvs"
    cacheable: true

- name: Check pip version
  ansible.builtin.command: "{{ base_pip_executable }} --version"
  register: base_pip_version_check
  changed_when: false
  failed_when: false

- name: Set fact for pip supports break-system-packages
  ansible.builtin.set_fact:
    base_pip_supports_break_system_packages: >-
      {{ base_pip_version_check.stdout is search('pip (2[3-9]|[3-9][0-9])')
      or base_pip_version_check.stdout is search('pip 2[2-9]\\.[1-9]') }}

- name: Check for externally managed Python
  ansible.builtin.shell: "ls /usr/lib/python3*/EXTERNALLY-MANAGED >/dev/null 2>&1"
  register: base_pip_externally_managed_check
  changed_when: false
  failed_when: false

- name: Set fact for pip externally managed
  ansible.builtin.set_fact:
    base_pip_externally_managed: "{{ base_pip_externally_managed_check.rc == 0 }}"
    base_pip_break_required: "{{ base_pip_externally_managed_check.rc == 0 }}"

- name: Fail when break-system-packages is required but disabled
  ansible.builtin.fail:
    msg: >-
      This host is externally managed (PEP 668). Set base_pip_break_system_packages: true
      to allow pip installs or use a venv/pipx.
  when:
    - base_pip_break_required
    - not base_pip_break_system_packages

- name: Fail when break-system-packages is required but unsupported by pip
  ansible.builtin.fail:
    msg: >-
      This host is externally managed (PEP 668) but pip does not support --break-system-packages.
      Upgrade pip or use a venv/pipx.
  when:
    - base_pip_break_required
    - not base_pip_supports_break_system_packages

- name: Upgrade pip to latest (CVE fixes)
  ansible.builtin.command: >-
    {{ base_pip_executable }} install --ignore-installed
    {{ '--break-system-packages' if base_pip_break_required else '' }}
    'pip>=25.3'
  become: true
  changed_when: false

# Run pip directly via shell so we can tee stdout+stderr to a log file. The
# ansible.builtin.pip module captures output into a single `msg` field that
# is too large for CloudWatch's per-event size limit on this dep tree
# (rigging pulls 100+ transitives), so failures show up as a truncated stdout
# with no stderr or rc visible. The tee'd log lets the next task surface the
# real error.
#
# `--ignore-installed` is required: Kali ships several Python deps via apt
# (python3-requests, python3-cryptography, python3-urllib3, python3-yaml).
# apt-installed packages have no pip RECORD file, so pip's normal upgrade
# path fails with `uninstall-no-record-file` ("The package was installed
# by debian"). `--ignore-installed` skips uninstall and overwrites in place.
- name: Install Ares Python dependencies (with full log)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      {{ base_pip_executable }} install \
        {{ '--break-system-packages' if base_pip_break_required else '' }} \
        --ignore-installed \
        --no-color \
        {{ base_pip_packages | map('quote') | join(' ') }} \
        2>&1 | tee /tmp/ares-pip-install.log
    executable: /bin/bash
  become: true
  register: base_pip_install_result
  changed_when: false
  failed_when: false

- name: Show pip install log tail on failure
  ansible.builtin.command: tail -120 /tmp/ares-pip-install.log
  become: true
  register: base_pip_install_tail
  changed_when: false
  when: base_pip_install_result.rc != 0

- name: Print pip install tail
  ansible.builtin.debug:
    var: base_pip_install_tail.stdout_lines
  when: base_pip_install_result.rc != 0

- name: Fail if pip install failed
  ansible.builtin.fail:
    msg: "pip install failed (rc={{ base_pip_install_result.rc }}); see tail above"
  when: base_pip_install_result.rc != 0

- name: Create Ares workspace directory
  ansible.builtin.file:
    path: "{{ base_workspace_dir }}"
    state: directory
    owner: "{{ base_workspace_owner }}"
    group: "{{ base_workspace_group }}"
    mode: "{{ base_workspace_mode }}"
  become: true
  when: base_create_workspace

# Host tuning (swap cushion + OOM sysctls) for the Ares worker fleet.
# No-op unless base_configure_swap / base_oom_tuning are enabled (attack box).
- name: Apply host tuning for the Ares worker fleet
  ansible.builtin.include_tasks: tuning.yml
  when: base_configure_swap or base_oom_tuning
