---
# Redis configuration
redis_bind_address: "127.0.0.1"
redis_port: 6379
redis_maxmemory: "256mb"
redis_maxmemory_policy: "allkeys-lru"

# Ares worker configuration
redis_install_ares_worker_unit: true
redis_ares_worker_binary: "/usr/local/bin/ares"
redis_ares_log_dir: "/var/log/ares"
redis_ares_config_dir: "/etc/ares"

# Worker cgroup resource limits (per-role instance).
# Workers spawn tool subprocesses (netexec, hashcat, nmap) that inherit the
# service cgroup. Without limits these can exhaust system memory and OOM-kill
# unrelated services like the SSM agent. The per-instance ceiling stays under
# the system-ares.slice global cap below.
redis_ares_worker_memory_high: "1500M"
redis_ares_worker_memory_max: "2G"
redis_ares_worker_tasks_max: 256

# Global cgroup cap for the whole Ares fleet (orchestrator + all workers),
# enforced by system-ares.slice. Backstops the per-instance limits so the
# fleet in aggregate cannot exhaust the instance.
redis_ares_slice_memory_high: "10G"
redis_ares_slice_memory_max: "12G"
redis_ares_slice_tasks_max: 8192

# Extra environment threaded into each worker unit.
# EnvironmentFile is optional (leading '-'): operators can drop per-op
# overrides in {{ redis_ares_config_dir }}/env without editing the unit.
redis_ares_otel_resource_attributes: "deployment.environment=staging,attack.team=red"

# ares@<role>.service instances to enable. Each subscribes to ares.tools.exec.<role>;
# a missing role means the orchestrator's tool calls for that role hang.
# Must match the role keys in ares-cli/tools.yaml.
redis_ares_worker_roles:
  - recon
  - credential_access
  - cracker
  - acl
  - privesc
  - lateral
  - coercion

# Blue team worker configuration. When true, installs the
# ares-blue-worker@.service template and enables one instance per role
# in redis_ares_blue_worker_roles. Independent of the red worker
# toggle so a blue-only node can run without the red role fleet.
redis_install_ares_blue_worker_unit: false
redis_ares_blue_worker_binary: "/usr/local/bin/ares-blue"

# OTEL attrs for blue units — distinguishes them from red workers in
# any observability that groups by attack.team.
redis_ares_blue_otel_resource_attributes: "deployment.environment=staging,attack.team=blue"

# ares-blue-worker@<role>.service instances to enable. Each blue role
# handles a distinct investigation task class (triage, hunt, lateral
# analysis). See ares-cli/src/worker/blue_task_loop.rs::parse_blue_role
# for the recognised names.
redis_ares_blue_worker_roles:
  - triage
  - threat_hunter
  - lateral_analyst

# Verification
redis_verify_install: false
