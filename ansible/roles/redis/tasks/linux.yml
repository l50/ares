---
- name: Install Redis server
  ansible.builtin.apt:
    name: redis-server
    state: present
    update_cache: true
  become: true

- name: Configure Redis bind address
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^bind '
    line: "bind {{ redis_bind_address }}"
  become: true
  notify: Restart redis

- name: Configure Redis port
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^port '
    line: "port {{ redis_port }}"
  become: true
  notify: Restart redis

- name: Configure Redis maxmemory
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^# ?maxmemory '
    line: "maxmemory {{ redis_maxmemory }}"
  become: true
  notify: Restart redis

- name: Configure Redis maxmemory-policy
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^# ?maxmemory-policy '
    line: "maxmemory-policy {{ redis_maxmemory_policy }}"
  become: true
  notify: Restart redis

- name: Enable and start Redis
  ansible.builtin.systemd:
    name: redis-server
    enabled: true
    state: started
  become: true

- name: Create Ares directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ redis_ares_log_dir }}"
    - "{{ redis_ares_config_dir }}"
  become: true

# Transitional: the worker template was renamed ares-worker@ -> ares@ (PR #226).
# Disable + remove any lingering old-named instances so they don't double-bind
# the NATS role subjects. Safe to keep; becomes a no-op once no host has it.
- name: Stat legacy ares-worker@ template unit
  ansible.builtin.stat:
    path: /etc/systemd/system/ares-worker@.service
  register: redis_legacy_worker_unit

- name: Disable + stop legacy ares-worker@ instances
  ansible.builtin.systemd:
    name: "ares-worker@{{ item }}.service"
    enabled: false
    state: stopped
  loop: "{{ redis_ares_worker_roles }}"
  become: true
  failed_when: false
  when: redis_legacy_worker_unit.stat.exists

- name: Remove legacy ares-worker@ template unit
  ansible.builtin.file:
    path: /etc/systemd/system/ares-worker@.service
    state: absent
  become: true
  when: redis_legacy_worker_unit.stat.exists
  notify: Reload systemd

- name: Install Ares system slice (global fleet cgroup cap)
  ansible.builtin.template:
    src: system-ares.slice.j2
    dest: /etc/systemd/system/system-ares.slice
    mode: '0644'
  become: true
  when: redis_install_ares_worker_unit
  notify: Reload systemd

- name: Install Ares worker systemd template unit
  ansible.builtin.template:
    src: ares@.service.j2
    dest: /etc/systemd/system/ares@.service
    mode: '0644'
  become: true
  when: redis_install_ares_worker_unit
  notify: Reload systemd

- name: Enable and start Ares worker instances
  ansible.builtin.systemd:
    name: "ares@{{ item }}.service"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ redis_ares_worker_roles }}"
  when: redis_install_ares_worker_unit
  become: true

- name: Verify Redis is responding
  ansible.builtin.command:
    cmd: redis-cli ping
  register: redis_ping
  changed_when: false
  when: redis_verify_install

- name: Display Redis verification
  ansible.builtin.debug:
    msg: "Redis ping response: {{ redis_ping.stdout }}"
  when: redis_verify_install
