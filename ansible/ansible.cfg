[defaults]
host_key_checking = False
retry_files_enabled = False
# Enable profiling
callback_whitelist = profile_tasks
# Allow legacy conditionals used by molecule_docker playbooks
allow_broken_conditionals = True
# Roles path - includes additional system paths for compatibility
roles_path = ~/.ansible/roles:./roles:/usr/share/ansible/roles:/etc/ansible/roles
collections_path = ~/.ansible/collections/ansible_collections
# Logging configuration
log_path = ~/.ansible/logs/nimbus_range.log
no_log = False
# Timeouts - reasonable defaults that won't conflict with SSM overrides
timeout = 600
command_timeout = 600
# Dedicated temp directory to prevent git index corruption conflicts
local_tmp = ~/.ansible/tmp/nimbus_range

[persistent_connection]
command_timeout = 600
connect_timeout = 120

[ssh_connection]
control_path = /tmp/ansible-%%h-%%p-%%r
