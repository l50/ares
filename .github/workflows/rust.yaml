---
name: "\U0001F980 Rust"
on:
  merge_group:
  pull_request:
    branches:
      - main
      - feat/more-attack-cov
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'ares-*/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yaml'
  push:
    branches:
      - main
    paths:
      - 'ares-*/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yaml'
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write

jobs:
  check:
    name: "\U0001F50D Cargo check"
    runs-on: ubuntu-latest
    steps:
      - name: Set up git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache cargo registry and build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ github.ref }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-${{ github.ref }}-
            ${{ runner.os }}-cargo-check-refs/heads/main-

      - name: Run cargo check
        run: cargo check --workspace

  test:
    name: "\U0001F9EA Tests"
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Set up git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ github.ref }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ github.ref }}-
            ${{ runner.os }}-cargo-test-refs/heads/main-

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Add test summary
        if: always()
        run: |
          {
            echo "## \U0001F980 Rust Test Results"
            echo
            echo '```'
            cargo test --workspace 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  fmt:
    name: "\U0001F4D0 Format"
    runs-on: ubuntu-latest
    steps:
      - name: Set up git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: "\U0001F4CE Clippy"
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Set up git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ github.ref }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-${{ github.ref }}-
            ${{ runner.os }}-cargo-clippy-refs/heads/main-

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
