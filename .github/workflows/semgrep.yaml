---
name: 🚨 Semgrep Analysis
on:
  merge_group:
  pull_request:
    branches:
      - main
      - feat/more-attack-cov
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight UTC

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write # Allows merge queue updates
  security-events: write # Required for GitHub Security tab

jobs:
  semgrep:
    name: 🚨 Semgrep Analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep@sha256:207983631beecdbe7fa29196c7f4a7a5f29033933cdb76c687ce4a672e07618d

    # Skip any PR created by dependabot to avoid permission issues:
    if: (github.actor != 'dependabot[bot]')

    steps:
      - name: Set up git repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Semgrep Analysis
        env:
          SEMGREP_RULES: >-
            p/rust
            p/python
            p/github-actions
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/supply-chain
          SEMGREP_TIMEOUT: 300 # 5-minute timeout per rule
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semgrep ci \
            --config="${SEMGREP_RULES}" \
            --timeout="${SEMGREP_TIMEOUT}" \
            --sarif --output=semgrep-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep-results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
