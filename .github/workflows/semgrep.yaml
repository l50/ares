---
name: 🚨 Semgrep Analysis
on:
  merge_group:
  pull_request:
    branches:
      - main
      - feat/more-attack-cov
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight UTC

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write # Allows merge queue updates
  security-events: write # Required for GitHub Security tab

jobs:
  semgrep:
    name: 🚨 Semgrep Analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep@sha256:2b33f46ba66cf8cc2ad59ccfa7d22951fd00c632c38f1339e84ec8e6e641a942

    # Skip any PR created by dependabot to avoid permission issues:
    if: (github.actor != 'dependabot[bot]')

    steps:
      - name: Set up git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Semgrep Analysis
        env:
          SEMGREP_RULES: >-
            p/rust
            p/python
            p/github-actions
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/supply-chain
          SEMGREP_TIMEOUT: 300 # 5-minute timeout per rule
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semgrep ci \
            --config="${SEMGREP_RULES}" \
            --timeout="${SEMGREP_TIMEOUT}" \
            --sarif --output=semgrep-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: semgrep-results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
