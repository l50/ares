# yaml-language-server: $schema=https://raw.githubusercontent.com/cowdogmoo/warpgate/main/schema/warpgate-template.json
metadata:
  name: ares-blue-agent
  version: 1.0.0
  description: Ares blue team agent for defensive security operations
  author: Dreadnode <info@dreadnode.io>
  license: MIT
  tags:
    - ares
    - blue-team
    - defensive
  requires:
    warpgate: ">=1.0.0"
name: ares-blue-agent
version: latest
base:
  image: ghcr.io/dreadnode/ares-base:latest
  pull: true
  run_command:
    - -d
    - -i
    - -t
  environment:
    DEBIAN_FRONTEND: noninteractive
    TZ: UTC
  changes:
    - ENTRYPOINT ["python", "-m", "ares", "--args.multi-agent"]
    - ENV DEBIAN_FRONTEND=noninteractive
    - ENV TZ=UTC
targets:
  - type: container
    platforms:
      - linux/amd64
      - linux/arm64
