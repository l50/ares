# yaml-language-server: $schema=https://raw.githubusercontent.com/cowdogmoo/warpgate/main/schema/warpgate-template.json
metadata:
  name: ares-blue-triage-agent
  version: 1.0.0
  description: Ares blue team triage agent for initial incident assessment and alerting
  author: Dreadnode <info@dreadnode.io>
  license: MIT
  tags:
    - ares
    - blue-team
    - defensive
    - triage
  requires:
    warpgate: ">=1.0.0"
name: ares-blue-triage-agent
version: latest
base:
  image: ghcr.io/dreadnode/ares-base:latest
  pull: true
  run_command:
    - -d
    - -i
    - -t
  environment:
    DEBIAN_FRONTEND: noninteractive
    TZ: UTC
  changes:
    - ENTRYPOINT ["python", "-m", "ares", "--args.multi-agent"]
    - ENV DEBIAN_FRONTEND=noninteractive
    - ENV TZ=UTC
provisioners:
  - type: shell
    only:
      - docker.amd64
    inline:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl
      - curl -fsSL https://github.com/grafana/mcp-grafana/releases/latest/download/mcp-grafana_Linux_x86_64.tar.gz -o /tmp/mcp-grafana.tar.gz
      - tar -xzf /tmp/mcp-grafana.tar.gz -C /usr/local/bin mcp-grafana
      - chmod +x /usr/local/bin/mcp-grafana
      - rm -f /tmp/mcp-grafana.tar.gz
      - apt-get clean
      - rm -rf /var/lib/apt/lists/*
  - type: shell
    only:
      - docker.arm64
    inline:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl
      - curl -fsSL https://github.com/grafana/mcp-grafana/releases/latest/download/mcp-grafana_Linux_arm64.tar.gz -o /tmp/mcp-grafana.tar.gz
      - tar -xzf /tmp/mcp-grafana.tar.gz -C /usr/local/bin mcp-grafana
      - chmod +x /usr/local/bin/mcp-grafana
      - rm -f /tmp/mcp-grafana.tar.gz
      - apt-get clean
      - rm -rf /var/lib/apt/lists/*
  - type: shell
    only:
      - docker.arm64
      - docker.amd64
    inline:
      - echo "Build completed successfully"
    changes:
      - USER root
      - WORKDIR /root
targets:
  - type: container
    platforms:
      - linux/amd64
      - linux/arm64
