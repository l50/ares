# yaml-language-server: $schema=https://raw.githubusercontent.com/cowdogmoo/warpgate/main/schema/warpgate-template.json
metadata:
  name: ares-golden-image
  version: 1.0.0
  description: Golden AMI with all Ares red team tools - recon, credential access, privesc, cracking, lateral movement, ACL abuse, and coercion
  author: Dreadnode <info@dreadnode.io>
  license: MIT
  tags:
    - ares
    - golden-image
    - red-team
    - ami
    - reconnaissance
    - credential-access
    - privilege-escalation
    - password-cracking
    - lateral-movement
    - acl
    - coercion
  requires:
    warpgate: '>=4.7.0'

name: ares-golden-image
version: latest

base:
  ami_filters:
    owners:
      - "679593333241"
    filters:
      name: "debian-kali-last-snapshot-amd64-*"
      architecture: "x86_64"
    most_recent: true

sources:
  # Use the in-repo ansible/ tree directly so builds match the working copy
  # (no GITHUB_TOKEN, no branch ref drift). Path is relative to this template's
  # directory; requires warpgate >= v4.7.0 (local source type).
  - name: ansible
    local:
      path: ../../../ansible

provisioners:
  - type: shell
    inline:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates git procps sudo python3-apt python3-pip python3-venv pipx
      - 'sed -i ''s|^PATH="|PATH="/root/.local/bin:/root/.cargo/bin:|'' /etc/environment || echo ''PATH="/root/.local/bin:/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"'' > /etc/environment'
      - pipx install --force uv
      - pipx install --force ansible-core
      - pipx ensurepath

  # Copy the in-repo ansible/ subtree (the dreadnode.nimbus_range collection) into the build.
  # The destination keeps the `nimbus_range` name because the collection is published as
  # `dreadnode.nimbus_range`; subsequent steps install it under that namespace.
  - type: file
    source: ${sources.ansible}
    destination: /root/.ansible/collections/ansible_collections/dreadnode/nimbus_range

  # NVIDIA driver for GPU-accelerated hashcat on g4dn (T4).
  # Install the in-sync cloud kernel meta + headers, then the driver WITH
  # recommends (NOT --no-install-recommends: it strips nvidia-smi + the GPU
  # compute stack) + clinfo. DKMS builds the module for the installed kernel.
  #
  # KNOWN LIMITATION: GPU *compute* only works after a reboot into that kernel.
  # EC2 Image Builder cannot reboot the Kali builder mid-build (exit 194 ->
  # workflow CANCELLED, the builder's SSM agent doesn't rejoin), so an AMI built
  # purely from this template enumerates the T4 but hashcat hangs on kernel build.
  # The canonical, GPU-VERIFIED golden is produced by
  # scripts/build-ares-golden-ami.sh (launch -> driver -> reboot -> tools ->
  # create-image). Keep this template for the tooling layer / reference.
  - type: shell
    inline:
      - apt-get update
      - DEBIAN_FRONTEND=noninteractive apt-get install -y linux-image-cloud-amd64 linux-headers-cloud-amd64 dkms
      - DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-driver nvidia-opencl-icd clinfo firmware-misc-nonfree
      - dkms status

  # Attack Box - all red team tools + Alloy telemetry
  # NOTE: Using shell instead of ansible provisioner because the playbook
  # exceeds EC2 Image Builder's 16000 character component limit.
  - type: shell
    inline:
      - PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin ansible-galaxy collection install -r /root/.ansible/collections/ansible_collections/dreadnode/nimbus_range/requirements.yml --force
      # Driver already installed in the previous step. Tell cracking_tools NOT to
      # reinstall it (reboots mid-component, kills this local run) and NOT to
      # install nvidia-cuda-toolkit (not a real Kali package; the OpenCL backend
      # is enough — ~40 GH/s on a T4). hashcat from apt, not source.
      - HOME=/root ANSIBLE_REMOTE_TMP=/tmp/ansible-tmp-$USER PATH=/root/.local/bin:/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin ansible-playbook /root/.ansible/collections/ansible_collections/dreadnode/nimbus_range/playbooks/ares/goad_attack_box.yml -i localhost, -c local -e ansible_shell_executable=/bin/bash -e ansible_python_interpreter=/usr/bin/python3 -e cracking_tools_gpu_support=true -e cracking_tools_nvidia_opencl_icd=true -e cracking_tools_install_nvidia_driver=false -e cracking_tools_install_cuda_toolkit=false -e cracking_tools_hashcat_from_source=false

  - type: shell
    inline:
      - apt-get clean
      - rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
      - echo "Ares golden image build completed successfully"

targets:
  - type: ami
    region: us-east-1
    instance_type: g4dn.xlarge
    ami_name: "ares-golden-image-{{timestamp}}"
    volume_size: 100
    ami_tags:
      Name: ares-golden-image
      Project: ares
      Role: RedTeamAttackBox
      ManagedBy: warpgate
      Tools: recon,credential-access,privesc,cracker,lateral-movement,acl-abuse,coercion
